<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- KEAMANAN: Izin agar Google Login tidak error (FedCM) -->
    <meta http-equiv="Permissions-Policy" content="identity-credentials-get=(self 'https://accounts.google.com')">
    
    <title>StudyFlow - Smart Study Planner Semester 6</title>
    
    <!-- Dependencies: Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            background-color: #F8F7FF;
        }

        /* Animasi Transisi */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        
        /* Efek Glassmorphism Premium */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .glass-sidebar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(124, 58, 237, 0.1);
        }

        /* Background Dinamis */
        .bg-studyflow {
            background-image: url('https://res.cloudinary.com/dfbkph06k/image/upload/v1772856252/607beaa0-a843-4430-b9c5-1ca9f1905b85_jjufh2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #C4B5FD; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #7C3AED; }

        .active-nav {
            background: linear-gradient(135deg, #7C3AED, #A78BFA);
            color: white !important;
            box-shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.3);
        }

        /* Modal Overlay */
        #modal-overlay {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-studyflow text-gray-800 min-h-screen relative overflow-x-hidden">

    <!-- Overlay tipis untuk menjaga keterbacaan -->
    <div class="fixed inset-0 bg-white/20 pointer-events-none z-0"></div>

    <!-- ================= VIEW LOGIN ================= -->

        <div class="glass-card p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center animate-fade">

                <img src="https://res.cloudinary.com/dfbkph06k/image/upload/v1772855204/ChatGPT_Image_Mar_7_2026_10_41_30_AM_bxqua9.png" alt="StudyFlow Logo" class="w-24 h-24 rounded-3xl mx-auto shadow-xl border-4 border-white object-cover transform -rotate-2" />
            </div>

                Study<span class="text-purple-600">Flow</span>

            <div class="flex justify-center mb-6">
                <div id="google-signin-button"></div>
            </div>
            
            <p id="conn-status" class="text-[10px] text-purple-400 uppercase tracking-widest font-bold">Connecting to studyflow-7afba...</p>
        </div>
    </div>

    <!-- ================= MAIN DASHBOARD VIEW ================= -->
    <div id="app-view" class="hidden flex min-h-screen relative z-10">
        
        <!-- Sidebar Desktop -->
        <aside class="hidden lg:flex flex-col w-72 h-screen sticky top-0 glass-sidebar p-6">
            <div class="flex items-center gap-3 mb-10 px-2">
                <img src="https://res.cloudinary.com/dfbkph06k/image/upload/v1772855204/ChatGPT_Image_Mar_7_2026_10_41_30_AM_bxqua9.png" class="w-10 h-10 rounded-xl object-cover shadow-md" />
                <h1 class="text-2xl font-black text-purple-700 tracking-tight">StudyFlow</h1>

            <nav class="flex-1 space-y-2">
                <button onclick="navigate('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-gray-500 hover:bg-purple-50 active-nav">

                <button onclick="navigate('matkul')" id="nav-matkul" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-gray-500 hover:bg-purple-50">
                    <i data-lucide="book-open"></i> Mata Kuliah

                <button onclick="navigate('jadwal')" id="nav-jadwal" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-gray-500 hover:bg-purple-50">

        <!-- Main Content Area -->

                    <div>
                        <h2 class="text-sm font-bold text-purple-600 uppercase tracking-widest uppercase">Akademik Planner</h2>

                    <button onclick="exportToExcel()" class="bg-purple-600 text-white px-5 py-3 rounded-2xl font-bold flex items-center gap-2 shadow-lg shadow-purple-200 hover:scale-105 transition-all">

        <!-- Bottom Nav Mobile -->
        <nav class="lg:hidden fixed bottom-6 left-6 right-6 h-20 glass-card rounded-[2rem] shadow-2xl flex items-center justify-around px-4 z-[90]">
            <button onclick="navigate('dashboard')" class="p-3 text-purple-600"><i data-lucide="layout-grid"></i></button>
            <button onclick="navigate('jadwal')" class="p-3 text-gray-400"><i data-lucide="calendar"></i></button>
            <button onclick="navigate('tugas')" class="p-3 text-gray-400"><i data-lucide="check-square"></i></button>
            <button onclick="navigate('target')" class="p-3 text-gray-400"><i data-lucide="target"></i></button>
        </nav>
    </div>

    <!-- ================= MODALS ================= -->
    <div id="modal-overlay" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
        <!-- Modal Jadwal -->
        <div id="modal-jadwal" class="hidden glass-card p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl border-2 border-white animate-fade">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black">Tambah Jadwal Kuliah</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition-all"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Mata Kuliah</label>
                    <input type="text" id="in-j-matkul" class="w-full px-5 py-3 rounded-2xl bg-white/50 border border-purple-100 outline-none focus:ring-2 focus:ring-purple-400" placeholder="Contoh: Metodologi Penelitian" />
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">SKS</label>
                        <input type="number" id="in-j-sks" class="w-full px-5 py-3 rounded-2xl bg-white/50 border border-purple-100 outline-none focus:ring-2 focus:ring-purple-400" placeholder="SKS" />
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Dosen Pengampu</label>
                        <input type="text" id="in-j-dosen" class="w-full px-5 py-3 rounded-2xl bg-white/50 border border-purple-100 outline-none focus:ring-2 focus:ring-purple-400" placeholder="Nama Dosen" />

                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Hari</label>
                        <select id="in-j-hari" class="w-full px-5 py-3 rounded-2xl bg-white/50 border border-purple-100 outline-none focus:ring-2 focus:ring-purple-400">
                            <option>Senin</option><option>Selasa</option><option>Rabu</option><option>Kamis</option><option>Jumat</option><option>Sabtu</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Waktu</label>
                        <input type="text" id="in-j-waktu" class="w-full px-5 py-3 rounded-2xl bg-white/50 border border-purple-100 outline-none focus:ring-2 focus:ring-purple-400" placeholder="08:00 - 10:00" />
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Ruangan</label>
                    <input type="text" id="in-j-ruang" class="w-full px-5 py-3 rounded-2xl bg-white/50 border border-purple-100 outline-none focus:ring-2 focus:ring-purple-400" placeholder="Contoh: R.203" />
                </div>
                <button onclick="saveJadwal()" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-purple-100 hover:bg-purple-700 transition-all transform active:scale-95">Simpan Jadwal</button>
            </div>
        </div>

        <!-- Modal Matkul -->
        <div id="modal-matkul" class="hidden glass-card p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl border-2 border-white animate-fade">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black">Tambah Mata Kuliah</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition-all"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-4 text-left">
                <input type="text" id="in-m-nama" class="w-full px-5 py-3 rounded-2xl bg-white/50 border border-purple-100 outline-none focus:ring-2 focus:ring-purple-400" placeholder="Nama Mata Kuliah" />
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="in-m-sks" class="w-full px-5 py-3 rounded-2xl bg-white/50 border border-purple-100 outline-none focus:ring-2 focus:ring-purple-400" placeholder="SKS" />
                    <input type="text" id="in-m-dosen" class="w-full px-5 py-3 rounded-2xl bg-white/50 border border-purple-100 outline-none focus:ring-2 focus:ring-purple-400" placeholder="Dosen Pengampu" />
                </div>
                <button onclick="saveMatkul()" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-purple-100 hover:bg-purple-700 transition-all transform active:scale-95">Simpan Mata Kuliah</button>
            </div>
        </div>

        <!-- Modal Tugas -->
        <div id="modal-tugas" class="hidden glass-card p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl border-2 border-white animate-fade">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black">Tambah Tugas Baru</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition-all"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-4 text-left">
                <input type="text" id="in-t-nama" class="w-full px-5 py-3 rounded-2xl bg-white/50 border border-purple-100 outline-none focus:ring-2 focus:ring-purple-400" placeholder="Nama Tugas" />
                <input type="text" id="in-t-matkul" class="w-full px-5 py-3 rounded-2xl bg-white/50 border border-purple-100 outline-none focus:ring-2 focus:ring-purple-400" placeholder="Pilih Mata Kuliah" />
                <input type="date" id="in-t-deadline" class="w-full px-5 py-3 rounded-2xl bg-white/50 border border-purple-100 outline-none focus:ring-2 focus:ring-purple-400" />
                <button onclick="saveTugas()" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-purple-100 hover:bg-purple-700 transition-all transform active:scale-95">Simpan Tugas</button>
            </div>
        </div>

        <!-- Modal Target -->
        <div id="modal-target" class="hidden glass-card p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl border-2 border-white animate-fade">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black">Tambah Target</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition-all"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-4 text-left">
                <input type="text" id="in-tg-teks" class="w-full px-5 py-3 rounded-2xl bg-white/50 border border-purple-100 outline-none focus:ring-2 focus:ring-purple-400" placeholder="Contoh: Lulus Sidang Skripsi" />
                <button onclick="saveTarget()" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-purple-100 hover:bg-purple-700 transition-all transform active:scale-95">Simpan Target</button>
            </div>
        </div>
    </div>

    <!-- ================= JAVASCRIPT MODULE ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBOO-C9UXIadukCG5Zl7n1qNtiVN-BaecY",
            authDomain: "studyflow-7afba.firebaseapp.com",
            projectId: "studyflow-7afba",
            storageBucket: "studyflow-7afba.firebasestorage.app",
            messagingSenderId: "1034032440737",
            appId: "1:1034032440737:web:030cffaa62db47b3f997e0",
            measurementId: "G-FHQC3GCFW0"
        };

        const GOOGLE_CLIENT_ID = "78272411326-gt4cobigqctk4t0e4n1b29q522j827of.apps.googleusercontent.com";
        const APP_ID_ROOT = 'studyflow-planner';

        // Init Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- STATE GLOBAL ---
        let currentUserId = null;
        let activeTab = 'dashboard';
        let store = { matkul: [], jadwal: [], tugas: [], target: [] };
        let listeners = [];

        // --- AUTHENTICATION ---
        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        }

        window.handleCredentialResponse = async (response) => {
            const data = parseJwt(response.credential);
            document.getElementById('profile-name').innerText = data.name;
            document.getElementById('profile-pic').src = data.picture;
            
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');
            
            initDataListeners();
            navigate('dashboard');
        };

        async function initAuth() {
            try {
                await signInAnonymously(auth);
                document.getElementById('conn-status').innerText = "Cloud Synced";
            } catch (err) {
                console.error("Firebase init error:", err);
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) currentUserId = user.uid;
        });

        // --- DATA LISTENERS ---
        function initDataListeners() {
            if (!currentUserId) return;
            listeners.forEach(unsub => unsub());

            const collections = ['matkul', 'jadwal', 'tugas', 'target'];
            collections.forEach(colName => {
                const q = collection(db, 'artifacts', APP_ID_ROOT, 'users', currentUserId, colName);
                const unsub = onSnapshot(q, (snapshot) => {
                    store[colName] = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderUI();
                });
                listeners.push(unsub);
            });
        }

        // --- NAVIGATION ---
        window.navigate = (view) => {
            activeTab = view;
            renderUI();
        };

        function renderUI() {
            const container = document.getElementById('content-area');
            if (!container) return;

            document.querySelectorAll('aside button').forEach(btn => btn.classList.remove('active-nav'));
            const activeNav = document.getElementById('nav-' + activeTab);
            if(activeNav) activeNav.classList.add('active-nav');

            if (activeTab === 'dashboard') renderDashboard(container);
            else if (activeTab === 'matkul') renderMatkul(container);
            else if (activeTab === 'jadwal') renderJadwal(container);
            else if (activeTab === 'tugas') renderTugas(container);
            else if (activeTab === 'target') renderTarget(container);

            lucide.createIcons();
        }

        // --- HELPERS ---
        function calculateDaysLeft(deadlineStr) {
            if (!deadlineStr) return 999;
            const deadline = new Date(deadlineStr);
            const today = new Date();
            today.setHours(0,0,0,0);
            const diffTime = deadline - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        // --- VIEWS ---
        function renderDashboard(el) {
            const targetDone = store.target.filter(t => t.selesai).length;
            const progress = store.target.length ? Math.round((targetDone / store.target.length) * 100) : 0;
            
            const urgentTasks = [...store.tugas]
                .filter(t => !t.status)
                .map(t => ({ ...t, daysLeft: calculateDaysLeft(t.deadline) }))
                .sort((a, b) => a.daysLeft - b.daysLeft);

            el.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-fade">
                    <div class="lg:col-span-2 space-y-8">
                        <div class="glass-card p-8 rounded-[2.5rem] shadow-xl">
                            <h3 class="text-xl font-black mb-6 text-purple-700 flex items-center gap-2"><i data-lucide="calendar"></i> Jadwal Terbaru</h3>
                            <div class="space-y-4">
                                ${store.jadwal.slice(0, 3).map(j => `
                                    <div class="flex items-center gap-4 p-4 rounded-3xl bg-white/50 border border-white">
                                        <div class="flex-1">
                                            <p class="font-black text-gray-800">${j.matkul}</p>
                                            <p class="text-xs text-gray-500 font-medium">${j.hari}, ${j.waktu} • ${j.ruang}</p>
                                            <p class="text-[9px] font-black text-purple-400 uppercase mt-1">${j.dosen || 'No Lecturer'} • ${j.sks || '0'} SKS</p>
                                        </div>
                                    </div>
                                `).join('') || '<p class="text-gray-400 italic">Belum ada jadwal kuliah.</p>'}
                            </div>
                        </div>
                        <div class="glass-card p-8 rounded-[2.5rem] shadow-xl">
                            <div class="flex justify-between items-end mb-4">
                                <h3 class="text-xl font-black text-purple-700">Target Semester</h3>
                                <p class="text-2xl font-black text-purple-600">${progress}%</p>
                            </div>
                            <div class="w-full bg-purple-100 h-4 rounded-full overflow-hidden">
                                <div class="bg-gradient-to-r from-purple-600 to-indigo-500 h-full transition-all duration-1000" style="width: ${progress}%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-8">
                        <div class="glass-card p-8 rounded-[2.5rem] shadow-xl border-t-4 border-red-400">
                            <h3 class="text-xl font-black mb-6 text-red-500 flex items-center gap-2"><i data-lucide="alert-circle"></i> Deadline Terdekat</h3>
                            <div class="space-y-4">
                                ${urgentTasks.slice(0, 3).map(t => `
                                    <div class="p-4 rounded-2xl bg-red-50 border border-red-100 shadow-sm">
                                        <p class="font-bold text-gray-800">${t.nama}</p>
                                        <p class="text-[10px] font-black uppercase text-red-400 mt-1">${t.daysLeft <= 0 ? 'HARI INI / LEWAT' : 'SISA ' + t.daysLeft + ' HARI'}</p>
                                    </div>
                                `).join('') || '<p class="text-gray-400">Semua aman!</p>'}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderMatkul(el) {
            el.innerHTML = `
                <div class="flex justify-between items-center mb-8 animate-fade">
                    <h2 class="text-3xl font-black tracking-tight">Daftar Mata Kuliah</h2>
                    <button onclick="openModal('matkul')" class="bg-purple-600 text-white px-6 py-4 rounded-2xl font-bold shadow-lg hover:scale-105 transition-all flex items-center gap-2"><i data-lucide="plus"></i> Tambah Matkul</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade">
                    ${store.matkul.map(m => `
                        <div class="glass-card p-6 rounded-[2rem] shadow-lg border-l-8 border-purple-500 flex justify-between items-start">
                            <div>
                                <h3 class="text-xl font-black text-gray-800">${m.nama}</h3>
                                <p class="text-gray-500 font-medium text-sm">${m.dosen}</p>
                                <p class="text-[10px] font-black text-purple-400 uppercase mt-2">${m.sks} SKS • SEMESTER 6</p>
                            </div>
                            <button onclick="deleteItem('matkul', '${m.id}')" class="text-red-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2"></i></button>
                        </div>
                    `).join('') || '<div class="col-span-full py-20 text-center text-gray-400">Kosong</div>'}
                </div>
            `;
        }

        function renderJadwal(el) {
            const hariList = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            el.innerHTML = `
                <div class="flex justify-between items-center mb-8 animate-fade">
                    <h2 class="text-3xl font-black tracking-tight">Jadwal Mingguan</h2>
                    <button onclick="openModal('jadwal')" class="bg-purple-600 text-white px-6 py-4 rounded-2xl font-bold shadow-lg hover:scale-105 transition-all flex items-center gap-2"><i data-lucide="plus"></i> Tambah Jadwal</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 animate-fade text-left">
                    ${hariList.map(hari => `
                        <div class="space-y-4">
                            <h3 class="text-lg font-black text-purple-600 border-b border-purple-100 pb-2 flex items-center gap-2"><i data-lucide="calendar" size="16"></i> ${hari}</h3>
                            ${store.jadwal.filter(j => j.hari === hari).map(j => `
                                <div class="glass-card p-5 rounded-3xl shadow-md border border-white group flex justify-between items-start hover:border-purple-200 transition-all">
                                    <div class="flex-1">
                                        <div class="flex justify-between items-start">
                                            <p class="font-bold text-gray-800 leading-tight">${j.matkul}</p>
                                            <span class="text-[10px] font-black text-purple-500 bg-purple-50 px-2 py-0.5 rounded-lg">${j.sks} SKS</span>
                                        </div>
                                        <p class="text-xs text-gray-500 font-semibold mt-1 italic">${j.dosen}</p>
                                        <div class="flex items-center gap-4 mt-3 text-[10px] text-gray-400 font-bold uppercase tracking-wider">
                                            <span class="flex items-center gap-1"><i data-lucide="clock" size="10"></i> ${j.waktu}</span>
                                            <span class="flex items-center gap-1"><i data-lucide="map-pin" size="10"></i> ${j.ruang}</span>
                                        </div>
                                    </div>
                                    <button onclick="deleteItem('jadwal', '${j.id}')" class="text-red-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all ml-2"><i data-lucide="trash-2" size="16"></i></button>
                                </div>
                            `).join('') || '<p class="text-[10px] text-gray-300 italic px-2">Tidak ada kuliah.</p>'}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderTugas(el) {
            const sortedTugas = [...store.tugas].map(t => ({
                ...t,
                daysLeft: calculateDaysLeft(t.deadline)
            })).sort((a, b) => {
                if (a.status !== b.status) return a.status ? 1 : -1;
                return a.daysLeft - b.daysLeft;
            });

            el.innerHTML = `
                <div class="flex justify-between items-center mb-8 animate-fade">
                    <h2 class="text-3xl font-black tracking-tight">Tugas & Deadline</h2>
                    <button onclick="openModal('tugas')" class="bg-purple-600 text-white px-6 py-4 rounded-2xl font-bold shadow-lg flex items-center gap-2"><i data-lucide="plus"></i> Tambah Tugas</button>
                </div>
                <div class="glass-card rounded-[2.5rem] overflow-hidden shadow-xl border border-white animate-fade">
                    <table class="w-full text-left">
                        <thead class="bg-purple-50 text-purple-700 text-[10px] font-black uppercase tracking-[0.2em] border-b border-purple-100">
                            <tr>
                                <th class="p-6">Tugas & Matkul</th>
                                <th class="p-6">Deadline</th>
                                <th class="p-6">Sisa Waktu</th>
                                <th class="p-6">Status</th>
                                <th class="p-6 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody class="text-sm font-semibold text-gray-600">
                            ${sortedTugas.map(t => `
                                <tr class="border-b border-purple-50 hover:bg-white/50 transition-all ${t.status ? 'opacity-50' : ''}">
                                    <td class="p-6">
                                        <p class="font-bold text-gray-800">${t.nama}</p>
                                        <span class="text-[10px] text-purple-400 font-black uppercase tracking-tight">${t.matkul}</span>
                                    </td>
                                    <td class="p-6 text-gray-400 font-medium">${t.deadline}</td>
                                    <td class="p-6">
                                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${t.daysLeft <= 3 ? 'bg-red-100 text-red-500' : 'bg-purple-100 text-purple-500'}">
                                            ${t.daysLeft <= 0 ? 'SEKARANG / LEWAT' : t.daysLeft + ' HARI LAGI'}
                                        </span>
                                    </td>
                                    <td class="p-6">
                                        <button onclick="toggleStatus('tugas', '${t.id}', ${t.status})" class="flex items-center gap-2 ${t.status ? 'text-green-500':'text-gray-300 hover:text-purple-400'} transition-colors">
                                            <i data-lucide="${t.status ? 'check-circle' : 'circle'}"></i>
                                            <span class="uppercase text-[10px] font-black">${t.status ? 'Selesai' : 'Belum'}</span>
                                        </button>
                                    </td>
                                    <td class="p-6 text-center">
                                        <button onclick="deleteItem('tugas', '${t.id}')" class="text-red-200 hover:text-red-500 transition-colors"><i data-lucide="trash-2" size="18"></i></button>
                                    </td>
                                </tr>
                            `).join('') || '<tr><td colspan="5" class="p-20 text-center text-gray-300">Belum ada tugas.</td></tr>'}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderTarget(el) {
            el.innerHTML = `
                <div class="max-w-2xl mx-auto py-10 animate-fade">
                    <div class="flex justify-between items-center mb-10">
                        <h2 class="text-4xl font-black tracking-tighter">Target Semester 6</h2>
                        <button onclick="openModal('target')" class="bg-purple-600 text-white p-4 rounded-2xl shadow-lg hover:rotate-90 transition-all"><i data-lucide="plus"></i></button>
                    </div>
                    <div class="space-y-4">
                        ${store.target.map(t => `
                            <div class="glass-card p-6 rounded-3xl flex items-center justify-between group border-2 ${t.selesai ? 'border-green-200 bg-green-50/20' : 'border-white'} transition-all">
                                <div class="flex items-center gap-4 cursor-pointer" onclick="toggleStatus('target', '${t.id}', ${t.selesai})">
                                    <div class="w-10 h-10 rounded-2xl flex items-center justify-center border-2 transition-all ${t.selesai ? 'bg-green-500 border-green-500 text-white shadow-lg shadow-green-100' : 'border-purple-100 bg-white'}">
                                        ${t.selesai ? '<i data-lucide="check"></i>' : ''}
                                    </div>
                                    <span class="text-lg font-bold ${t.selesai ? 'text-gray-400 line-through' : 'text-gray-700 tracking-tight'}">${t.teks}</span>
                                </div>
                                <button onclick="deleteItem('target', '${t.id}')" class="text-red-200 group-hover:text-red-500 transition-all"><i data-lucide="trash-2" class="w-5"></i></button>
                            </div>
                        `).join('') || '<p class="text-center text-gray-400 py-10">Belum ada target yang dibuat.</p>'}
                    </div>
                </div>
            `;
        }

        // --- CRUD ACTIONS ---
        window.openModal = (id) => {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.querySelectorAll('#modal-overlay > div').forEach(m => m.classList.add('hidden'));
            document.getElementById('modal-' + id).classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('modal-overlay').classList.add('hidden');

        window.saveJadwal = async () => {
            const matkul = document.getElementById('in-j-matkul').value;
            const sks = document.getElementById('in-j-sks').value;
            const dosen = document.getElementById('in-j-dosen').value;
            const hari = document.getElementById('in-j-hari').value;
            const waktu = document.getElementById('in-j-waktu').value;
            const ruang = document.getElementById('in-j-ruang').value;
            
            if(!matkul || !currentUserId) return;
            
            await addDoc(collection(db, 'artifacts', APP_ID_ROOT, 'users', currentUserId, 'jadwal'), {
                matkul, sks, dosen, hari, waktu, ruang, createdAt: serverTimestamp()
            });
            closeModal();
        };

        window.saveMatkul = async () => {
            const nama = document.getElementById('in-m-nama').value;
            const sks = document.getElementById('in-m-sks').value;
            const dosen = document.getElementById('in-m-dosen').value;
            if(!nama || !currentUserId) return;
            await addDoc(collection(db, 'artifacts', APP_ID_ROOT, 'users', currentUserId, 'matkul'), {
                nama, sks: parseInt(sks), dosen, semester: 6, createdAt: serverTimestamp()
            });
            closeModal();
        };

        window.saveTugas = async () => {
            const nama = document.getElementById('in-t-nama').value;
            const matkul = document.getElementById('in-t-matkul').value;
            const deadline = document.getElementById('in-t-deadline').value;
            if(!nama || !currentUserId) return;
            await addDoc(collection(db, 'artifacts', APP_ID_ROOT, 'users', currentUserId, 'tugas'), {
                nama, matkul, deadline, status: false, createdAt: serverTimestamp()
            });
            closeModal();
        };

        window.saveTarget = async () => {
            const teks = document.getElementById('in-tg-teks').value;
            if(!teks || !currentUserId) return;
            await addDoc(collection(db, 'artifacts', APP_ID_ROOT, 'users', currentUserId, 'target'), {
                teks, selesai: false, createdAt: serverTimestamp()
            });
            closeModal();
        };

        window.toggleStatus = async (col, docId, currentStatus) => {
            const field = col === 'tugas' ? 'status' : 'selesai';
            await updateDoc(doc(db, 'artifacts', APP_ID_ROOT, 'users', currentUserId, col, docId), { [field]: !currentStatus });
        };

        window.deleteItem = async (col, docId) => {
            if(confirm('Hapus data ini?')) {
                await deleteDoc(doc(db, 'artifacts', APP_ID_ROOT, 'users', currentUserId, col, docId));
            }
        };

        window.logout = () => window.location.reload();
        window.exportToExcel = () => alert("Export format Excel sedang diproses...");

        // Init App
        initAuth();
        
        // Google Init
        window.onload = () => {
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: window.handleCredentialResponse,
                use_fedcm_for_prompt: true 
            });
            google.accounts.id.renderButton(
                document.getElementById("google-signin-button"),
                { theme: "outline", size: "large", width: 320, shape: "pill" }
            );
            lucide.createIcons();
        };

    </script>
</body>
</html>
