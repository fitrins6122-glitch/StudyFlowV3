<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- KEAMANAN: Izin agar Google Login tidak error (FedCM) -->
    <meta http-equiv="Permissions-Policy" content="identity-credentials-get=(self 'https://accounts.google.com')">
    
    <title>StudyFlow - Smart Study Planner Semester 6</title>
    
    <!-- Dependencies: Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- EKSPOR EXCEL: Library SheetJS (XLSX) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- CHART.JS: Library untuk Grafik -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style id="dynamic-font-style">
        /* Default Font Size: Sedang */
        :root { --base-font-size: 16px; }
        html { font-size: var(--base-font-size); }
    </style>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            background-color: #F8F7FF;
            transition: font-size 0.2s ease-in-out;
            -webkit-tap-highlight-color: transparent;
        }

        /* Animasi Transisi */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s ease-out forwards; }
        
        /* Efek Glassmorphism Premium */
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 40px -10px rgba(124, 58, 237, 0.08);
        }

        .glass-sidebar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(124, 58, 237, 0.1);
        }

        /* Background Dinamis dengan Gambar Generatif AI */
        .bg-studyflow {
            background-image: url('https://res.cloudinary.com/dfbkph06k/image/upload/v1772856252/607beaa0-a843-4430-b9c5-1ca9f1905b85_jjufh2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #D8B4FE; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9333EA; }

        .active-nav {
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            color: white !important;
            box-shadow: 0 10px 20px -5px rgba(109, 40, 217, 0.4);
            transform: scale(1.02);
        }

        /* Modal Overlay */
        #modal-overlay {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
        }

        .font-opt-active {
            background-color: #7C3AED !important;
            color: white !important;
        }

        /* Loading Screen */
        #loading-screen {
            background: white;
            z-index: 1000;
        }

        /* Truncate long matkul names for mobile */
        .mobile-truncate {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Gradient Text */
        .text-gradient {
            background: linear-gradient(to right, #7C3AED, #DB2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-studyflow text-gray-800 min-h-screen relative overflow-x-hidden">

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 flex items-center justify-center">
        <div class="text-center p-6">
            <div class="w-12 h-12 md:w-16 md:h-16 border-4 border-purple-200 border-t-purple-600 rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-purple-600 font-bold animate-pulse text-sm md:text-base tracking-wide">Menyiapkan StudyFlow...</p>
        </div>
    </div>

    <!-- Overlay tipis -->
    <div class="fixed inset-0 bg-white/30 pointer-events-none z-0"></div>

    <!-- ================= VIEW LOGIN ================= -->
    <div id="login-view" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="glass-card p-8 md:p-12 rounded-[2rem] md:rounded-[3rem] shadow-2xl w-full max-w-md text-center animate-fade flex flex-col justify-center items-center border-t border-l border-white/80 relative overflow-hidden">
            <!-- Dekorasi Login -->
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-purple-400 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-pulse"></div>
            <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-pink-400 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-pulse delay-700"></div>

            <div class="mb-8 relative z-10">
                <img src="https://res.cloudinary.com/dfbkph06k/image/upload/v1772855204/ChatGPT_Image_Mar_7_2026_10_41_30_AM_bxqua9.png" alt="StudyFlow Logo" class="w-24 h-24 md:w-28 md:h-28 rounded-3xl mx-auto shadow-2xl border-4 border-white object-cover transform hover:rotate-6 transition-transform duration-500" />
            </div>
            
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter mb-3 text-gray-900 relative z-10">
                Study<span class="text-gradient">Flow</span>
            </h1>
            <p class="text-gray-500 mb-8 font-medium leading-relaxed px-2 text-sm md:text-base relative z-10">Ruang belajar pintarmu. Kelola jadwal, tugas, dan capai target semester ini.</p>
            
            <div class="flex flex-col items-center gap-4 mb-4 w-full relative z-10">
                <button onclick="loginWithGoogle()" class="flex items-center justify-center gap-3 w-full max-w-[280px] bg-white border-2 border-purple-50 text-gray-700 font-bold py-3.5 px-4 rounded-2xl shadow-xl shadow-purple-100 hover:bg-purple-50 hover:border-purple-200 transition-all active:scale-95 text-sm md:text-base group">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5 group-hover:scale-110 transition-transform">
                    Lanjutkan dengan Google
                </button>
            </div>
            
            <div id="conn-status" class="text-[10px] text-purple-500 uppercase tracking-widest font-bold mt-4 min-h-[32px] w-full flex items-center justify-center text-center px-4 relative z-10"></div>
        </div>
    </div>

    <!-- ================= MAIN DASHBOARD VIEW ================= -->
    <div id="app-view" class="hidden flex min-h-screen relative z-10">
        
        <!-- Sidebar Desktop (Hidden on mobile/tablet) -->
        <aside class="hidden lg:flex flex-col w-72 h-screen sticky top-0 glass-sidebar p-6 z-40">
            <div class="flex items-center gap-4 mb-12 px-2 pt-4">
                <img src="https://res.cloudinary.com/dfbkph06k/image/upload/v1772855204/ChatGPT_Image_Mar_7_2026_10_41_30_AM_bxqua9.png" class="w-12 h-12 rounded-xl object-cover shadow-lg border-2 border-white" />
                <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-br from-purple-700 to-pink-500 tracking-tighter">StudyFlow</h1>
            </div>

            <nav class="flex-1 space-y-3">
                <button onclick="navigate('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-gray-500 hover:bg-purple-100 hover:text-purple-700 active-nav text-sm">
                    <i data-lucide="layout-grid"></i> Dashboard
                </button>
                <button onclick="navigate('matkul')" id="nav-matkul" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-gray-500 hover:bg-purple-100 hover:text-purple-700 text-sm">
                    <i data-lucide="book-open"></i> Mata Kuliah
                </button>
                <button onclick="navigate('jadwal')" id="nav-jadwal" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-gray-500 hover:bg-purple-100 hover:text-purple-700 text-sm">
                    <i data-lucide="calendar"></i> Jadwal Kuliah
                </button>
                <button onclick="navigate('tugas')" id="nav-tugas" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-gray-500 hover:bg-purple-100 hover:text-purple-700 text-sm">
                    <i data-lucide="check-square"></i> Tugas & Deadline
                </button>
                <button onclick="navigate('target')" id="nav-target" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-gray-500 hover:bg-purple-100 hover:text-purple-700 text-sm">
                    <i data-lucide="target"></i> Target Semester
                </button>
            </nav>

            <div class="pt-6 border-t border-purple-100/50 pb-4">
                <button onclick="logout()" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-red-500 hover:bg-red-50 hover:shadow-inner transition-all font-bold text-sm">
                    <i data-lucide="log-out"></i> Keluar
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 p-4 md:p-8 lg:p-10 pb-32 lg:pb-10 max-w-[1600px] mx-auto w-full overflow-y-auto h-screen relative z-10">
            
            <!-- Top Header (Responsive) -->
            <header class="flex justify-between items-center mb-8 bg-white/60 p-4 md:p-5 rounded-[1.5rem] md:rounded-[2rem] border border-white/80 backdrop-blur-xl sticky top-0 z-50 shadow-sm transition-all hover:shadow-md">
                <div class="flex items-center gap-3 md:gap-5 overflow-hidden">
                    <div class="relative">
                        <img id="profile-pic" src="" class="w-12 h-12 md:w-14 md:h-14 rounded-full border-4 border-white shadow-md object-cover flex-shrink-0" onerror="this.src='https://ui-avatars.com/api/?name=User&background=7C3AED&color=fff'" />
                        <div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-green-400 border-2 border-white rounded-full"></div>
                    </div>
                    <div class="overflow-hidden">
                        <h2 class="text-[10px] md:text-xs font-black text-purple-500 uppercase tracking-[0.2em] truncate">Selamat Datang,</h2>
                        <h1 id="profile-name" class="text-sm md:text-xl font-black text-gray-800 tracking-tight truncate leading-tight">Memuat...</h1>
                    </div>
                </div>
                
                <div class="flex items-center gap-2 md:gap-4">
                    <!-- Dropdown Atur Font -->
                    <div class="relative group hidden sm:block">
                        <button class="bg-white p-3 md:p-3.5 rounded-xl md:rounded-2xl shadow-sm text-gray-400 hover:text-purple-600 hover:bg-purple-50 hover:shadow-md transition-all focus:outline-none" title="Atur Tampilan">
                            <i data-lucide="type" size="20"></i>
                        </button>
                        <!-- Menu Font -->
                        <div class="absolute right-0 top-full mt-3 opacity-0 invisible group-hover:opacity-100 group-hover:visible glass-card rounded-2xl p-2 w-40 shadow-2xl z-[100] border border-purple-100 transition-all duration-300 transform origin-top-right scale-95 group-hover:scale-100">
                            <p class="text-[9px] font-black text-purple-400 uppercase px-3 py-2 mb-1 tracking-widest border-b border-purple-50">Ukuran Teks</p>
                            <button onclick="setFontSize('small')" id="btn-font-small" class="w-full text-left px-3 py-2.5 rounded-xl text-xs font-bold hover:bg-purple-50 transition-all flex items-center justify-between mb-1 text-gray-600">
                                Kecil <span class="text-[10px] opacity-40 bg-gray-100 px-1.5 py-0.5 rounded">14px</span>
                            </button>
                            <button onclick="setFontSize('medium')" id="btn-font-medium" class="w-full text-left px-3 py-2.5 rounded-xl text-xs font-bold hover:bg-purple-50 transition-all flex items-center justify-between mb-1 text-gray-600 font-opt-active">
                                Sedang <span class="text-[10px] opacity-40 bg-gray-100 px-1.5 py-0.5 rounded">16px</span>
                            </button>
                            <button onclick="setFontSize('large')" id="btn-font-large" class="w-full text-left px-3 py-2.5 rounded-xl text-xs font-bold hover:bg-purple-50 transition-all flex items-center justify-between text-gray-600">
                                Besar <span class="text-[10px] opacity-40 bg-gray-100 px-1.5 py-0.5 rounded">18px</span>
                            </button>
                        </div>
                    </div>

                    <!-- Tombol Export Excel -->
                    <button onclick="exportToExcel()" class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-4 md:px-6 py-3 md:py-3.5 rounded-xl md:rounded-2xl font-bold flex items-center gap-2 shadow-lg shadow-purple-300 hover:shadow-xl hover:-translate-y-1 transition-all text-xs md:text-sm active:scale-95 group">
                        <i data-lucide="file-spreadsheet" size="18" class="group-hover:animate-bounce"></i> <span class="hidden sm:inline">Export Excel</span>
                    </button>
                    
                    <!-- Tombol Logout Khusus Mobile -->
                    <button onclick="logout()" class="lg:hidden bg-white p-3 rounded-xl shadow-sm text-red-500 hover:bg-red-50 hover:shadow-md transition-all focus:outline-none" title="Keluar">
                        <i data-lucide="log-out" size="20"></i>
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div id="content-area" class="animate-fade relative z-0"></div>
        </main>

        <!-- Bottom Nav Mobile (Visible on Mobile & Tablet) -->
        <nav class="lg:hidden fixed bottom-6 left-4 right-4 h-[72px] glass-card rounded-[2rem] shadow-2xl flex items-center justify-around px-2 z-[90] border border-white/80 backdrop-blur-xl">
            <button onclick="navigate('dashboard')" id="m-nav-dashboard" class="p-3.5 transition-all rounded-2xl flex flex-col items-center gap-1 group">
                <i data-lucide="layout-grid" class="group-hover:scale-110 transition-transform"></i>
                <span class="text-[8px] font-bold opacity-0 h-0 group-[.text-purple-600]:opacity-100 group-[.text-purple-600]:h-auto transition-all">Dasbor</span>
            </button>
            <button onclick="navigate('matkul')" id="m-nav-matkul" class="p-3.5 transition-all rounded-2xl flex flex-col items-center gap-1 group">
                <i data-lucide="book-open" class="group-hover:scale-110 transition-transform"></i>
                <span class="text-[8px] font-bold opacity-0 h-0 group-[.text-purple-600]:opacity-100 group-[.text-purple-600]:h-auto transition-all">Matkul</span>
            </button>
            <button onclick="navigate('jadwal')" id="m-nav-jadwal" class="p-3.5 transition-all rounded-2xl flex flex-col items-center gap-1 group">
                <i data-lucide="calendar" class="group-hover:scale-110 transition-transform"></i>
                <span class="text-[8px] font-bold opacity-0 h-0 group-[.text-purple-600]:opacity-100 group-[.text-purple-600]:h-auto transition-all">Jadwal</span>
            </button>
            <button onclick="navigate('tugas')" id="m-nav-tugas" class="p-3.5 transition-all rounded-2xl flex flex-col items-center gap-1 group">
                <i data-lucide="check-square" class="group-hover:scale-110 transition-transform"></i>
                <span class="text-[8px] font-bold opacity-0 h-0 group-[.text-purple-600]:opacity-100 group-[.text-purple-600]:h-auto transition-all">Tugas</span>
            </button>
            <button onclick="navigate('target')" id="m-nav-target" class="p-3.5 transition-all rounded-2xl flex flex-col items-center gap-1 group">
                <i data-lucide="target" class="group-hover:scale-110 transition-transform"></i>
                <span class="text-[8px] font-bold opacity-0 h-0 group-[.text-purple-600]:opacity-100 group-[.text-purple-600]:h-auto transition-all">Target</span>
            </button>
        </nav>
    </div>

    <!-- ================= MODALS (Responsive sizing) ================= -->
    <div id="modal-overlay" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
        <!-- Modal Content Wrapper -->
        <div id="modal-content-wrapper" class="w-full max-w-md animate-fade transform scale-95 transition-transform duration-300">
            <!-- Modal Jadwal -->
            <div id="modal-jadwal" class="hidden glass-card bg-white/90 p-6 md:p-8 rounded-[2rem] w-full shadow-2xl border border-white">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h3 class="text-xl md:text-2xl font-black text-gray-800 tracking-tight">Jadwal Baru</h3>
                        <p class="text-xs text-purple-500 font-bold tracking-widest uppercase mt-1">Tambah Kelas</p>
                    </div>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 hover:bg-red-50 p-2 rounded-xl transition-all"><i data-lucide="x"></i></button>
                </div>
                <div class="space-y-4 text-left">
                    <input type="text" id="in-j-matkul" class="w-full px-5 py-3.5 rounded-xl bg-gray-50 border border-gray-200 outline-none focus:ring-2 focus:ring-purple-400 focus:bg-white transition-all text-sm font-medium" placeholder="Nama Mata Kuliah" />
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="in-j-s
