<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- KEAMANAN: Izin FedCM agar Google Login tidak error di browser modern -->
    <meta http-equiv="Permissions-Policy" content="identity-credentials-get=(self 'https://accounts.google.com')">
    
    <title>StudyFlow - Dashboard Akademik Modern</title>
    
    <!-- Dependencies: Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        /* Animasi Kustom */
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        /* Glassmorphism Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #A78BFA; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F3F0FF] text-gray-800 min-h-screen overflow-x-hidden relative">

    <!-- Latar Belakang Artistik Generatif -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute top-[-10%] right-[-5%] w-[40%] h-[40%] bg-purple-200 rounded-full blur-[120px] opacity-60"></div>
        <div class="absolute bottom-[-10%] left-[-5%] w-[40%] h-[40%] bg-indigo-200 rounded-full blur-[120px] opacity-60"></div>
        <div class="absolute inset-0 bg-cover bg-center opacity-[0.05]" style="background-image: url('https://www.transparenttextures.com/patterns/cubes.png')"></div>
    </div>

    <!-- Container Utama Notifikasi Toast -->
    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3"></div>

    <!-- ================= VIEW LOGIN ================= -->
    <div id="login-view" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="glass-card p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center animate-slide-up border-2 border-white">
            <img src="https://res.cloudinary.com/dfbkph06k/image/upload/v1772855204/ChatGPT_Image_Mar_7_2026_10_41_30_AM_bxqua9.png" alt="StudyFlow Logo" class="w-24 h-24 rounded-3xl mx-auto shadow-xl mb-6 transform -rotate-3 hover:rotate-0 transition-all duration-500 object-cover border-4 border-white" />
            
            <h1 class="text-4xl font-extrabold tracking-tight mb-2">
                Study<span class="text-purple-600">Flow</span>
            </h1>
            <p class="text-gray-500 mb-10 font-medium px-4 leading-relaxed">Kelola tugas kuliah dan raih target semestermu dalam satu genggaman.</p>
            
            <!-- Tombol Google Sign-In -->
            <div id="google-button-container" class="flex justify-center min-h-[50px] transition-transform hover:scale-[1.02]"></div>
            
            <p id="auth-status" class="text-[10px] text-purple-400 mt-8 uppercase tracking-widest font-bold">Menghubungkan ke Cloud...</p>
        </div>
    </div>

    <!-- ================= VIEW DASHBOARD (Hidden by Default) ================= -->
    <div id="main-app" class="hidden flex min-h-screen relative z-10">
        
        <!-- Sidebar Desktop -->
        <aside class="hidden lg:flex flex-col w-72 h-screen sticky top-0 glass-card border-r border-purple-100 p-8 shadow-sm">
            <div class="flex items-center gap-3 mb-10">
                <img src="https://res.cloudinary.com/dfbkph06k/image/upload/v1772855204/ChatGPT_Image_Mar_7_2026_10_41_30_AM_bxqua9.png" alt="Logo" class="w-10 h-10 rounded-xl shadow-md border-2 border-white object-cover" />
                <h1 class="text-2xl font-black text-purple-700 tracking-tight">StudyFlow</h1>
            </div>

            <nav class="flex-1 space-y-2">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold group">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard
                </button>
                <button onclick="switchTab('jadwal')" id="nav-jadwal" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold group">
                    <i data-lucide="calendar" class="w-5 h-5"></i> Jadwal Kuliah
                </button>
                <button onclick="switchTab('tugas')" id="nav-tugas" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold group">
                    <i data-lucide="check-circle-2" class="w-5 h-5"></i> Daftar Tugas
                </button>
                <button onclick="switchTab('target')" id="nav-target" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold group">
                    <i data-lucide="target" class="w-5 h-5"></i> Target Semester
                </button>
            </nav>

            <div class="pt-6 border-t border-purple-100">
                <button onclick="handleLogout()" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-red-500 hover:bg-red-50 transition-all font-bold">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 lg:p-10 pb-32 lg:pb-10 max-w-7xl mx-auto w-full">
            
            <!-- Header Mobile & User Info -->
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="greeting-text" class="text-2xl lg:text-3xl font-black text-gray-800">Halo, Mahasiswa! 👋</h2>
                    <p class="text-gray-500 text-sm font-medium">Hari ini adalah waktu yang tepat untuk produktif.</p>
                </div>
                <div class="flex items-center gap-4">
                    <img id="user-avatar" src="" alt="Avatar" class="w-12 h-12 rounded-full border-4 border-white shadow-lg" onerror="this.src='https://ui-avatars.com/api/?background=A78BFA&color=fff&name=User'" />
                </div>
            </header>

            <div id="content-area" class="animate-fade-in">
                <!-- Konten dinamis dirender via JS -->
            </div>
        </main>

        <!-- Bottom Navigation Mobile -->
        <nav class="lg:hidden fixed bottom-6 left-6 right-6 h-20 glass-card rounded-[2rem] shadow-2xl border-2 border-white flex items-center justify-around px-4 z-[90]">
            <button onclick="switchTab('dashboard')" class="p-3 rounded-2xl transition-all"><i data-lucide="layout-grid"></i></button>
            <button onclick="switchTab('jadwal')" class="p-3 rounded-2xl transition-all"><i data-lucide="calendar"></i></button>
            <button onclick="switchTab('tugas')" class="p-3 rounded-2xl transition-all"><i data-lucide="check-circle-2"></i></button>
            <button onclick="switchTab('target')" class="p-3 rounded-2xl transition-all"><i data-lucide="target"></i></button>
            <button onclick="handleLogout()" class="p-3 rounded-2xl text-red-500"><i data-lucide="log-out"></i></button>
        </nav>
    </div>

    <!-- ================= MODALS ================= -->
    <div id="modal-overlay" class="hidden fixed inset-0 z-[100] bg-black/20 backdrop-blur-md flex items-center justify-center p-4 transition-opacity">
        <!-- Modal Content (Target) -->
        <div id="modal-target" class="hidden glass-card p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl animate-slide-up border-2 border-white">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black">Tambah Target Baru</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500"><i data-lucide="x"></i></button>
            </div>
            <form onsubmit="handleSaveTarget(event)" class="space-y-4">
                <input type="text" id="input-target-name" required placeholder="Contoh: Lulus IPK 3.8" class="w-full px-6 py-4 rounded-2xl bg-white/50 border border-purple-100 focus:ring-4 focus:ring-purple-200 outline-none transition-all font-medium" />
                <button type="submit" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-purple-200 hover:bg-purple-700 transition-all transform active:scale-95">Simpan Target</button>
            </form>
        </div>
    </div>

    <!-- ================= JAVASCRIPT MODULE ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBOO-C9UXIadukCG5Zl7n1qNtiVN-BaecY",
            authDomain: "studyflow-7afba.firebaseapp.com",
            projectId: "studyflow-7afba",
            storageBucket: "studyflow-7afba.firebasestorage.app",
            messagingSenderId: "1034032440737",
            appId: "1:1034032440737:web:030cffaa62db47b3f997e0",
            measurementId: "G-FHQC3GCFW0"
        };

        // Init Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = 'studyflow-planner';

        // State Global
        let userId = null;
        let userData = null;
        let activeTab = 'dashboard';
        let store = { targets: [], tasks: [], schedules: [] };
        let listeners = [];

        // --- AUTHENTICATION LOGIC ---
        
        // Dekode Token Google JWT
        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        }

        // Callback Google Sign-In
        window.handleCredentialResponse = async (response) => {
            const payload = parseJwt(response.credential);
            userData = {
                name: payload.name,
                firstName: payload.given_name,
                email: payload.email,
                avatar: payload.picture
            };

            // Update UI User
            document.getElementById('user-avatar').src = userData.avatar;
            document.getElementById('greeting-text').innerText = `Halo, ${userData.firstName}! 👋`;
            
            // Masuk ke Dashboard
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            initFirestoreData();
            showToast(`Berhasil masuk sebagai ${userData.name}`);
        };

        // Inisialisasi Google One Tap & Button
        window.onload = () => {
            google.accounts.id.initialize({
                client_id: "78272411326-gt4cobigqctk4t0e1n1b29q522j827of.apps.googleusercontent.com",
                callback: window.handleCredentialResponse,
                use_fedcm_for_prompt: true
            });
            google.accounts.id.renderButton(
                document.getElementById("google-button-container"),
                { theme: "outline", size: "large", width: "320", shape: "pill", text: "continue_with" }
            );
            google.accounts.id.prompt();
            lucide.createIcons();
        };

        // Firebase Auth Monitor
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                await signInAnonymously(auth);
                document.getElementById('auth-status').innerText = "Siap Digunakan";
            } else {
                userId = user.uid;
            }
        });

        window.handleLogout = () => {
            listeners.forEach(unsub => unsub());
            window.location.reload();
        };

        // --- FIRESTORE DATA LOGIC (RULE 1 & 2) ---
        
        function initFirestoreData() {
            if (!userId) return;

            // Clear previous listeners
            listeners.forEach(unsub => unsub());

            const paths = {
                targets: collection(db, 'artifacts', APP_ID, 'users', userId, 'targets'),
                tasks: collection(db, 'artifacts', APP_ID, 'users', userId, 'tasks'),
                schedules: collection(db, 'artifacts', APP_ID, 'users', userId, 'schedules')
            };

            // Setup Real-time Listeners
            Object.entries(paths).forEach(([key, colRef]) => {
                const unsub = onSnapshot(colRef, (snapshot) => {
                    store[key] = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderUI();
                }, (err) => console.error(`Error ${key}:`, err));
                listeners.push(unsub);
            });
        }

        // --- UI RENDERING ---

        window.switchTab = (tab) => {
            activeTab = tab;
            renderUI();
        };

        function renderUI() {
            const container = document.getElementById('content-area');
            updateNavUI();

            if (activeTab === 'dashboard') {
                const doneTargets = store.targets.filter(t => t.completed).length;
                const progress = store.targets.length ? Math.round((doneTargets / store.targets.length) * 100) : 0;
                
                container.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <!-- Card Progres Utama -->
                        <div class="lg:col-span-2 glass-card p-8 rounded-[2.5rem] border-2 border-white shadow-xl relative overflow-hidden group">
                            <div class="relative z-10">
                                <h3 class="text-xl font-black mb-1">Capaian Target</h3>
                                <p class="text-gray-500 text-sm mb-6">${doneTargets} dari ${store.targets.length} target selesai</p>
                                
                                <div class="flex items-end gap-4 mb-4">
                                    <span class="text-6xl font-black text-purple-600">${progress}%</span>
                                    <span class="text-purple-400 font-bold mb-2">Selesai</span>
                                </div>
                                
                                <div class="w-full bg-purple-100 h-4 rounded-full overflow-hidden">
                                    <div class="bg-gradient-to-r from-purple-500 to-indigo-500 h-full transition-all duration-1000" style="width: ${progress}%"></div>
                                </div>
                            </div>
                            <i data-lucide="award" class="absolute top-6 right-6 w-24 h-24 text-purple-500/10 group-hover:scale-110 transition-transform"></i>
                        </div>

                        <!-- Card Statistik Singkat -->
                        <div class="space-y-4">
                            <div class="glass-card p-6 rounded-3xl border-2 border-white flex items-center gap-5">
                                <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500">
                                    <i data-lucide="book-open"></i>
                                </div>
                                <div>
                                    <p class="text-xs font-bold text-gray-400 uppercase tracking-tighter">SKS Semester</p>
                                    <p class="text-2xl font-black">22 SKS</p>
                                </div>
                            </div>
                            <div class="glass-card p-6 rounded-3xl border-2 border-white flex items-center gap-5">
                                <div class="w-14 h-14 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500">
                                    <i data-lucide="check-square"></i>
                                </div>
                                <div>
                                    <p class="text-xs font-bold text-gray-400 uppercase tracking-tighter">Tugas Aktif</p>
                                    <p class="text-2xl font-black">${store.tasks.filter(t => t.status !== 'Selesai').length}</p>
                                </div>
                            </div>
                        </div>

                        <!-- Daftar Deadline Terdekat -->
                        <div class="lg:col-span-3">
                            <h3 class="text-xl font-black mb-6 flex items-center gap-2">
                                <i data-lucide="alert-circle" class="text-red-500"></i> Tugas Prioritas
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                ${store.tasks.filter(t => t.status !== 'Selesai').slice(0, 3).map(t => `
                                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-purple-50 hover:shadow-md transition-all">
                                        <p class="font-bold mb-1">${t.title}</p>
                                        <div class="flex items-center gap-2 text-xs text-gray-400 font-medium">
                                            <i data-lucide="clock" class="w-3 h-3"></i> Deadline: ${t.deadlineDate}
                                        </div>
                                    </div>
                                `).join('') || '<p class="text-gray-400 italic">Tidak ada tugas mendesak.</p>'}
                            </div>
                        </div>
                    </div>
                `;
            } else if (activeTab === 'target') {
                container.innerHTML = `
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-2xl font-black">Target Semester 6</h2>
                        <button onclick="openModal('target')" class="bg-purple-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-purple-100 flex items-center gap-2">
                            <i data-lucide="plus"></i> Tambah Target
                        </button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${store.targets.map(t => `
                            <div class="glass-card p-6 rounded-3xl flex items-center justify-between group border-2 ${t.completed ? 'border-purple-200 bg-purple-50/30' : 'border-white'}">
                                <div class="flex items-center gap-4 cursor-pointer flex-1" onclick="handleToggleTarget('${t.id}', ${t.completed})">
                                    <div class="w-7 h-7 rounded-lg border-2 flex items-center justify-center transition-all ${t.completed ? 'bg-purple-600 border-purple-600 text-white' : 'border-gray-200 bg-white'}">
                                        ${t.completed ? '<i data-lucide="check" class="w-4 h-4"></i>' : ''}
                                    </div>
                                    <span class="font-bold text-lg ${t.completed ? 'line-through text-gray-400' : 'text-gray-700'}">${t.text}</span>
                                </div>
                                <button onclick="handleDelete('targets', '${t.id}')" class="p-2 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">
                                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                                </button>
                            </div>
                        `).join('') || '<div class="col-span-full py-20 text-center text-gray-400">Belum ada target yang dibuat.</div>'}
                    </div>
                `;
            } else {
                container.innerHTML = `<div class="py-20 text-center text-gray-400">Halaman <b>${activeTab}</b> sedang dalam sinkronisasi.</div>`;
            }
            
            lucide.createIcons();
        }

        function updateNavUI() {
            const tabs = ['dashboard', 'jadwal', 'tugas', 'target'];
            tabs.forEach(t => {
                const el = document.getElementById(`nav-${t}`);
                if (!el) return;
                if (activeTab === t) {
                    el.classList.add('bg-purple-600', 'text-white', 'shadow-xl', 'shadow-purple-200');
                    el.classList.remove('text-gray-600', 'hover:bg-purple-50');
                } else {
                    el.classList.remove('bg-purple-600', 'text-white', 'shadow-xl', 'shadow-purple-200');
                    el.classList.add('text-gray-600', 'hover:bg-purple-50');
                }
            });
        }

        // --- ACTIONS ---

        window.openModal = (type) => {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById(`modal-${type}`).classList.remove('hidden');
        };

        window.closeModal = () => {
            document.getElementById('modal-overlay').classList.add('hidden');
            const modals = ['target'];
            modals.forEach(m => document.getElementById(`modal-${m}`).classList.add('hidden'));
        };

        window.handleSaveTarget = async (e) => {
            e.preventDefault();
            const text = document.getElementById('input-target-name').value;
            if (!text || !userId) return;

            try {
                const colRef = collection(db, 'artifacts', APP_ID, 'users', userId, 'targets');
                await addDoc(colRef, {
                    text,
                    completed: false,
                    createdAt: serverTimestamp()
                });
                e.target.reset();
                closeModal();
                showToast("Target berhasil disimpan!");
            } catch (err) {
                showToast("Gagal menyimpan data", true);
            }
        };

        window.handleToggleTarget = async (id, currentStatus) => {
            try {
                const docRef = doc(db, 'artifacts', APP_ID, 'users', userId, 'targets', id);
                await updateDoc(docRef, { completed: !currentStatus });
            } catch (err) {
                showToast("Gagal memperbarui target", true);
            }
        };

        window.handleDelete = async (col, id) => {
            try {
                const docRef = doc(db, 'artifacts', APP_ID, 'users', userId, col, id);
                await deleteDoc(docRef);
                showToast("Data berhasil dihapus");
            } catch (err) {
                showToast("Gagal menghapus data", true);
            }
        };

        // --- UTILS ---
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = `px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 text-white font-bold animate-slide-up ${isError ? 'bg-red-500' : 'bg-purple-600'}`;
            toast.innerHTML = `<i data-lucide="${isError ? 'x-circle' : 'check-circle'}"></i> ${msg}`;
            document.getElementById('toast-container').appendChild(toast);
            lucide.createIcons({ root: toast });
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

    </script>
</body>
</html>
