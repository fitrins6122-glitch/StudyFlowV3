    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; transition: background-color 0.3s ease; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        .view-transition {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Drag effect styling */
        .dragging {
            opacity: 0.4;
            transform: scale(0.98);
        }

        /* Glassmorphism for Dark Mode */
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">

    <script type="text/babel">
        const { useState, useEffect, useMemo, Fragment } = React;

                grip: <><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></>,
                up: <polyline points="18 15 12 9 6 15"/>,
                down: <polyline points="6 9 12 15 18 9"/>,
                settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>

        };

        const INITIAL_STUDENTS = [

            { nim: "20924854", nama: "Fahri Fauzan" },
            { nim: "20924855", nama: "Faldi Fahrizal" },
            { nim: "20924856", nama: "Farhan Fitrahudin" },
            { nim: "20924857", nama: "Fira Selomita" },
            { nim: "20924858", nama: "Fitri Nuraeni Solihah" },
            { nim: "20924860", nama: "Hadist Guida Herdiana" },
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [searchTerm, setSearchTerm] = useState('');
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [viewSize, setViewSize] = useState('medium'); 
            const [isSyncing, setIsSyncing] = useState(false);
            
            const [students, setStudents] = useState(INITIAL_STUDENTS);
            const [attendanceData, setAttendanceData] = useState([]);
            const [assignmentData, setAssignmentData] = useState([]);
            const [schedule, setSchedule] = useState({ attendance: {}, assignments: {} });
            
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [isInputModalOpen, setIsInputModalOpen] = useState(false);
            const [isTaskInputModalOpen, setIsTaskInputModalOpen] = useState(false);
            
            const [newStudent, setNewStudent] = useState({ nama: '', nim: '' });
            const [editingData, setEditingData] = useState(null);
            const [draggedItemIndex, setDraggedItemIndex] = useState(null);

            const [activePertemuan, setActivePertemuan] = useState(1);
            const [activeTugasDropdown, setActiveTugasDropdown] = useState(1);
            const [lectureMode, setLectureMode] = useState('offline');
            const [sessionDate, setSessionDate] = useState(new Date().toISOString().split('T')[0]);
            const [taskDate, setTaskDate] = useState(new Date().toISOString().split('T')[0]);
            
            const [manualAttendance, setManualAttendance] = useState({});
            const [manualAssignments, setManualAssignments] = useState({});

            const LOGO_URL = "https://res.cloudinary.com/dfbkph06k/image/upload/v1773041131/ChatGPT_Image_Mar_9_2026_02_24_03_PM_nm9b7b.png";
            const BG_LIGHT = "https://res.cloudinary.com/dfbkph06k/image/upload/v1773040282/ChatGPT_Image_Mar_9_2026_02_09_09_PM_nec4ra.png";
            const BG_DARK = "https://res.cloudinary.com/dfbkph06k/image/upload/v1773040339/ChatGPT_Image_Mar_9_2026_02_11_41_PM_jjwdzg.png";

            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [isDarkMode]);

            const filteredStudents = useMemo(() => {
                return students.filter(s => (s.nama || "").toLowerCase().includes(searchTerm.toLowerCase()) || (s.nim || "").includes(searchTerm));
            }, [searchTerm, students]);

            const sizeClasses = useMemo(() => {
                switch(viewSize) {
                    case 'small': return 'text-[11px]';
                    case 'large': return 'text-[15px]';
                    default: return 'text-[13px]';
                }
            }, [viewSize]);

            const spacingClasses = useMemo(() => {
                switch(viewSize) {
                    case 'small': return 'p-2 py-1';
                    case 'large': return 'p-5 py-4';
                    default: return 'p-4 py-3';
                }
            }, [viewSize]);

            // --- DRAG & DROP LOGIC ---
            const handleDragStart = (index) => setDraggedItemIndex(index);
            const handleDragOver = (e) => e.preventDefault();
            const handleDrop = (index) => {
                if (draggedItemIndex === null || draggedItemIndex === index) return;
                const newStudents = [...students];
                const draggedItem = newStudents[draggedItemIndex];
                newStudents.splice(draggedItemIndex, 1);
                newStudents.splice(index, 0, draggedItem);
                setStudents(newStudents);
                setDraggedItemIndex(null);
            };

            // --- DATA HANDLERS ---
            const handleAddStudent = () => {
                if (newStudent.nama && newStudent.nim) {
                    setStudents([...students, newStudent]);
                    setNewStudent({ nama: '', nim: '' });
                    setIsAddModalOpen(false);
                }
            };

            const handleDeleteStudent = (nim) => {
                if (confirm("Hapus data mahasiswa ini?")) {
                    setStudents(prev => prev.filter(s => s.nim !== nim));
                    setAttendanceData(prev => prev.filter(a => a.nim !== nim));
                    setAssignmentData(prev => prev.filter(a => a.nim !== nim));
                }
            };

            const shuffleStudents = () => setStudents([...students].sort(() => Math.random() - 0.5));

            const openEditModal = (student) => {
                setEditingData({ originalNim: student.nim, nama: student.nama, nim: student.nim });
                setIsEditModalOpen(true);
            };

            const handleSaveEdit = () => {
                setStudents(prev => prev.map(s => s.nim === editingData.originalNim ? { nama: editingData.nama, nim: editingData.nim } : s));
                setAttendanceData(prev => prev.map(a => a.nim === editingData.originalNim ? { ...a, nim: editingData.nim } : a));
                setAssignmentData(prev => prev.map(a => a.nim === editingData.originalNim ? { ...a, nim: editingData.nim } : a));
                setIsEditModalOpen(false);
            };

            const updateAttendance = (nim, id, type, status) => {
                setAttendanceData(prev => {
                    const other = prev.filter(a => !(a.nim === nim && a.id === id && a.type === type));
                    return status ? [...other, { nim, id, type, status }] : other;
                });
            };

            const updateAssignment = (nim, id, type, status) => {
                setAssignmentData(prev => {
                    const other = prev.filter(a => !(a.nim === nim && a.id === id && a.type === type));
                    return status === 'Selesai' ? [...other, { nim, id, type, status: 'Selesai' }] : other;
                });
            };

            const saveManualAttendance = () => {
                const type = (activePertemuan === 99) ? 'uts' : (activePertemuan === 100) ? 'uas' : 'pertemuan';
                const newRecords = Object.entries(manualAttendance).map(([nim, status]) => ({ nim, id: activePertemuan, type, status }));
                setAttendanceData(prev => [...prev.filter(a => !(a.type === type && a.id === activePertemuan)), ...newRecords]);
                const keyType = (activePertemuan === 99) ? 'uts' : (activePertemuan === 100) ? 'uas' : `pertemuan-${activePertemuan}`;
                setSchedule(prev => ({ ...prev, attendance: { ...prev.attendance, [keyType]: { date: sessionDate, mode: lectureMode } } }));
                setIsInputModalOpen(false);
            };

            const saveManualAssignments = () => {
                const type = (activeTugasDropdown === 99) ? 'uts' : (activeTugasDropdown === 100) ? 'uas' : 'tugas';
                const newRecords = Object.entries(manualAssignments).filter(([_, status]) => status === 'Selesai').map(([nim, status]) => ({ nim, id: activeTugasDropdown, type, status }));
                setAssignmentData(prev => [...prev.filter(a => !(a.type === type && a.id === activeTugasDropdown)), ...newRecords]);
                const keyType = (activeTugasDropdown === 99) ? 'uts' : (activeTugasDropdown === 100) ? 'uas' : `tugas-${activeTugasDropdown}`;
                setSchedule(prev => ({ ...prev, assignments: { ...prev.assignments, [keyType]: { date: taskDate } } }));
                setIsTaskInputModalOpen(false);
            };

            const handleAutoSync = async () => {
                setIsSyncing(true);
                setTimeout(() => {
                    const newAttendance = [...attendanceData];
                    students.forEach(s => {
                        if (parseInt(s.nim.slice(-1)) % 2 !== 0) {
                            const type = (activePertemuan === 99) ? 'uts' : (activePertemuan === 100) ? 'uas' : 'pertemuan';
                            if (!newAttendance.some(a => a.nim === s.nim && a.id === activePertemuan && a.type === type)) {
                                newAttendance.push({ nim: s.nim, id: activePertemuan, type, status: 'Hadir' });
                            }
                        }
                    });
                    setAttendanceData(newAttendance);
                    const keyType = (activePertemuan === 99) ? 'uts' : (activePertemuan === 100) ? 'uas' : `pertemuan-${activePertemuan}`;
                    setSchedule(prev => ({ ...prev, attendance: { ...prev.attendance, [keyType]: { date: sessionDate, mode: 'online' } } }));
                    setIsSyncing(false);
                    setIsInputModalOpen(false);
                }, 1200);
            };

            const handleExport = async () => {
                let exportData = students.map(student => {
                    const row = { "Nama Mahasiswa": student.nama, "NIM": student.nim };
                    if (activeTab === 'absensi') {
                        for (let i = 1; i <= 14; i++) {
                            const sched = schedule.attendance[`pertemuan-${i}`];
                            const record = attendanceData.find(a => a.nim === student.nim && a.id === i && a.type === 'pertemuan');
                            row[`P${i}${sched?.date ? ` (${sched.date})` : ""}`] = record ? record.status : "-";
                        }
                    } else {
                        for (let i = 1; i <= 6; i++) {
                            const sched = schedule.assignments[`tugas-${i}`];
                            const record = assignmentData.find(a => a.nim === student.nim && a.id === i && a.type === 'tugas');
                            row[`Tugas ${i}${sched?.date ? ` (${sched.date})` : ""}`] = record ? "Selesai" : "-";
                        }
                    }
                    return row;
                });
                const ws = XLSX.utils.json_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Data");
                XLSX.writeFile(wb, `Rekap_Keuangan_Bisnis.xlsx`);
            };

            return (
                <div 
                    className={`min-h-screen transition-all duration-500 bg-fixed bg-cover bg-center view-transition ${isDarkMode ? 'dark text-white' : 'text-slate-900'} ${sizeClasses}`}
                    style={{ backgroundImage: `url(${isDarkMode ? BG_DARK : BG_LIGHT})` }}
                >
                    <div className={`${isDarkMode ? 'bg-slate-950/80' : 'bg-white/10'} min-h-screen transition-colors duration-300`}>
                    
                    <header className={`sticky top-0 z-40 border-b transition-all duration-300 ${isDarkMode ? 'bg-slate-900/90 border-white/10 backdrop-blur-md' : 'bg-white/90 border-slate-200 backdrop-blur-md'}`}>
                        <div className="max-w-7xl mx-auto px-4 h-24 flex items-center justify-between">
                            <div className="flex items-center space-x-6">
                                <img src={LOGO_URL} alt="Logo" className="w-20 h-20 object-contain bg-white p-1 rounded-2xl shadow-xl" />
                                <div>
                                    <h1 className="font-black text-2xl tracking-tight leading-none uppercase">Keuangan Bisnis</h1>
                                    <p className={`text-[10px] mt-1 uppercase tracking-[0.2em] font-black ${isDarkMode ? 'text-blue-400' : 'text-blue-600'}`}>Digital Dashboard System</p>
                                </div>
                            </div>
                            <nav className="hidden md:flex items-center space-x-4">
                                <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl">
                                    {['small', 'medium', 'large'].map(sz => (
                                        <button key={sz} onClick={() => setViewSize(sz)} className={`px-3 py-1.5 rounded-lg text-[10px] font-black transition-all ${viewSize === sz ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'}`}>{sz[0].toUpperCase()}</button>
                                    ))}
                                </div>
                                <div className="flex items-center space-x-2 border-l border-slate-200 dark:border-slate-700 pl-4">
                                    <button onClick={() => setActiveTab('dashboard')} className={`px-4 py-2 rounded-lg flex items-center gap-2 font-bold transition-all ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800'}`}><Icon name="chart" /> Beranda</button>

                                                <span className="text-[10px] font-black uppercase truncate max-w-[140px]">{s.nama}</span>
                                                <div className="flex gap-1.5">{['Hadir', 'Izin', 'Alpa'].map(st => (
                                                    <button key={st} onClick={() => setManualAttendance({...manualAttendance, [s.nim]: st})} className={`w-9 h-9 rounded-xl text-[10px] font-black border transition-all ${manualAttendance[s.nim] === st ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-slate-50 dark:bg-slate-700 dark:border-white/5 text-slate-400'}`}>{st[0]}</button>
                                                ))}</div>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={saveManualAttendance} className="w-full py-5 bg-blue-600 text-white rounded-[1.5rem] font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Simpan Rekapitulasi</button>
                                </div>
                            )}
                        </div>
                    </Modal>}

                    {isTaskInputModalOpen && <Modal title="Input Tugas Masal" isDark={isDarkMode} onClose={() => setIsTaskInputModalOpen(false)} icon={<Icon name="file" />}>
                        <div className="p-8 space-y-5 text-slate-800 dark:text-white">
                            <button onClick={() => { const all = {}; students.forEach(s => all[s.nim] = 'Selesai'); setManualAssignments(all); }} className="w-full py-3 bg-indigo-600 text-white rounded-xl text-[10px] font-black uppercase shadow-lg">Tandai Semua Selesai</button>
                            <div className="max-h-[40vh] overflow-y-auto custom-scrollbar space-y-2 pr-2">
                                {students.map(s => (
                                    <div key={s.nim} className={`flex justify-between items-center p-3 border rounded-xl shadow-sm ${isDarkMode ? 'bg-slate-800 border-white/5' : 'bg-white'}`}>
                                        <span className="text-[10px] font-black uppercase truncate max-w-[140px]">{s.nama}</span>
                                        <button onClick={() => setManualAssignments({...manualAssignments, [s.nim]: manualAssignments[s.nim] === 'Selesai' ? '' : 'Selesai'})} className={`px-5 py-2.5 rounded-xl text-[9px] font-black transition-all ${manualAssignments[s.nim] === 'Selesai' ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-slate-100 dark:bg-slate-700 dark:border-white/5 text-slate-400'}`}>{manualAssignments[s.nim] === 'Selesai' ? 'SELESAI' : 'BELUM'}</button>
                                    </div>
                                ))}
                            </div>
                            <button onClick={saveManualAssignments} className="w-full py-5 bg-indigo-600 text-white rounded-[1.5rem] font-black uppercase text-xs shadow-xl transition-all">Simpan Pengumpulan</button>
                        </div>
                    </Modal>}

                    <footer className={`py-12 text-center border-t text-[10px] uppercase font-black transition-all duration-300 ${isDarkMode ? 'border-white/5 text-slate-600' : 'text-slate-400 border-slate-100'}`}>Digital Admin Dashboard • v6.5 • Google Form Integrated</footer>
                    </div>
                </div>
            );
        };

        const StatCard = ({ title, value, icon, isDark }) => (
            <div className={`p-6 rounded-[2.5rem] border shadow-lg transition-all transform hover:-translate-y-1 ${isDark ? 'bg-slate-900/90 border-white/10 text-white shadow-black/20' : 'bg-white border-slate-200 text-slate-800 shadow-slate-200/50'}`}>
                <div className="flex justify-between items-start">
                    <div><p className="text-[10px] font-black uppercase opacity-40 mb-1 tracking-widest">{title}</p><h4 className="text-2xl font-black uppercase tracking-tighter">{value}</h4></div>
                    <div className="p-4 bg-blue-600/10 text-blue-500 rounded-[1.5rem]"><Icon name={icon} className="w-6 h-6" strokeWidth={2.5}/></div>
                </div>
            </div>
        );

        const QuickActionIcon = ({ icon, label, value }) => (
            <div className="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/10 transition-all hover:bg-white/10 cursor-default group">
                <div className="w-12 h-12 rounded-xl bg-blue-600/20 flex items-center justify-center text-blue-400 group-hover:scale-110 transition-transform"><Icon name={icon} /></div>
                <div><p className="text-[10px] font-bold opacity-40 uppercase tracking-widest">{label}</p><p className="text-sm font-black uppercase tracking-tight">{value}</p></div>
            </div>
        );

        const Modal = ({ title, icon, children, onClose, isDark }) => (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-xl animate-in fade-in duration-300">
                <div className={`w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl border flex flex-col max-h-[90vh] transition-all duration-300 ${isDark ? 'bg-slate-900 border-white/10 text-white' : 'bg-white border-slate-100 text-slate-800'}`}>
                    <div className={`p-8 border-b flex items-center justify-between shrink-0 ${isDark ? 'border-white/5' : 'border-slate-50'}`}>
                        <div className="flex items-center gap-3 text-blue-600 dark:text-blue-400">
                            <div className="p-2 bg-blue-600/10 rounded-lg">{icon}</div>
                            <h3 className="font-black text-xl uppercase tracking-tighter">{title}</h3>
                        </div>
                        <button onClick={onClose} className="p-2.5 rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-rose-500 hover:text-white transition-all"><Icon name="x" className="w-4 h-4"/></button>
                    </div>
                    {children}
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
