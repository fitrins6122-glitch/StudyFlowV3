<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- KEAMANAN: Izin akses identitas untuk browser modern -->
    <meta http-equiv="Permissions-Policy" content="identity-credentials-get=(self 'https://accounts.google.com')">
    
    <title>StudyFlow - Login & Dashboard</title>
    
    <!-- Dependencies: Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            padding: 0;
        }

        /* Animasi Muncul */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeInUp 0.6s ease-out forwards; }
        
        /* Efek Kaca (Glassmorphism) */
        .glass-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        /* Latar Belakang Gambar AI Generatif */
        .bg-studyflow {
            background-image: url('https://res.cloudinary.com/dfbkph06k/image/upload/v1772856252/607beaa0-a843-4430-b9c5-1ca9f1905b85_jjufh2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="bg-studyflow min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <!-- Overlay ungu transparan untuk estetika -->
    <div class="absolute inset-0 bg-purple-900/10 pointer-events-none"></div>

    <!-- ================= LAYAR LOGIN ================= -->
    <div id="login-view" class="glass-container p-10 rounded-[3rem] w-full max-w-md text-center relative z-10 animate-fade-up">
        <div class="mb-8">
            <div class="w-24 h-24 bg-white rounded-3xl mx-auto shadow-2xl flex items-center justify-center p-3 transform -rotate-3 mb-4">
                <img src="https://res.cloudinary.com/dfbkph06k/image/upload/v1772855204/ChatGPT_Image_Mar_7_2026_10_41_30_AM_bxqua9.png" alt="StudyFlow Logo" class="w-full h-full object-cover rounded-xl" />
            </div>
            <h1 class="text-4xl font-extrabold tracking-tighter text-gray-800">
                Study<span class="text-purple-600">Flow</span>
            </h1>
            <p class="text-gray-500 mt-2 font-medium">Platform akademik masa depan</p>
        </div>

        <div class="space-y-6">
            <p class="text-gray-600 text-sm leading-relaxed px-2">
                Masuk untuk sinkronisasi jadwal, tugas, dan target semestermu secara otomatis.
            </p>
            
            <!-- Wadah Tombol Google Sign-In Resmi -->
            <div class="flex justify-center py-4">
                <div id="google-btn"></div>
            </div>
        </div>

        <p class="mt-8 text-[10px] text-gray-400 font-bold uppercase tracking-widest">
            Terhubung ke localhost:5500
        </p>
    </div>

    <!-- ================= LAYAR DASHBOARD (Awalnya Tersembunyi) ================= -->
    <div id="dashboard-view" class="hidden glass-container p-12 rounded-[3.5rem] w-full max-w-xl text-center relative z-10 animate-fade-up">
        <div class="flex flex-col items-center">
            <!-- Foto Profil dari Google -->
            <div class="relative group cursor-pointer mb-6">
                <div class="absolute -inset-1 bg-gradient-to-r from-purple-600 to-indigo-600 rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
                <img id="user-photo" src="" alt="Profile" class="relative w-32 h-32 rounded-full border-4 border-white shadow-2xl object-cover" />
                <div class="absolute bottom-1 right-1 bg-green-500 w-6 h-6 rounded-full border-4 border-white"></div>
            </div>

            <h2 class="text-purple-600 font-bold uppercase tracking-[0.3em] text-xs mb-2">Selamat Datang di StudyFlow</h2>
            <h1 id="user-display-name" class="text-3xl font-black text-gray-800 mb-1">Nama Pengguna</h1>
            <p id="user-email-address" class="text-gray-500 font-medium mb-10">email@kampus.ac.id</p>

            <!-- Statistik Singkat -->
            <div class="grid grid-cols-2 gap-4 w-full mb-10 text-left">
                <div class="bg-white/40 p-5 rounded-3xl border border-white/50 shadow-sm">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Status Keaktifan</p>
                    <p class="text-lg font-bold text-purple-700">Mahasiswa Aktif</p>
                </div>
                <div class="bg-white/40 p-5 rounded-3xl border border-white/50 shadow-sm">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Sesi Terkini</p>
                    <p class="text-lg font-bold text-purple-700">Terautentikasi</p>
                </div>
            </div>

            <button onclick="handleLogout()" class="group flex items-center gap-3 bg-red-50 text-red-500 px-10 py-4 rounded-2xl font-bold hover:bg-red-500 hover:text-white transition-all duration-300 shadow-lg shadow-red-100 border border-red-100">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                Keluar Aplikasi
            </button>
        </div>
    </div>

    <!-- ================= LOGIKA JAVASCRIPT ================= -->
    <script>
        // --- KONFIGURASI ---
        const GOOGLE_CLIENT_ID = "78272411326-gt4cobigqctk4t0e1n1b29q522j827of.apps.googleusercontent.com";

        /**
         * Fungsi untuk membedah data profil dari JWT token Google
         */
        function decodeJwtResponse(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (err) {
                console.error("Gagal mendecode token:", err);
                return null;
            }
        }

        /**
         * Fungsi yang dipanggil setelah pengguna sukses login
         */
        function onSignInSuccess(response) {
            const userData = decodeJwtResponse(response.credential);
            
            if (userData) {
                // Tampilkan data di UI Dashboard
                document.getElementById('user-display-name').innerText = userData.name;
                document.getElementById('user-email-address').innerText = userData.email;
                document.getElementById('user-photo').src = userData.picture;

                // Transisi View
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                
                lucide.createIcons();
                console.log("Data Pengguna:", userData);
            }
        }

        /**
         * Inisialisasi Google Identity saat halaman dimuat
         */
        window.onload = function () {
            try {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: onSignInSuccess,
                    // FIX: Menonaktifkan FedCM prompt untuk menghindari error permission di konsol
                    use_fedcm_for_prompt: false 
                });

                // Render tombol login resmi sesuai identitas brand Google
                google.accounts.id.renderButton(
                    document.getElementById("google-btn"),
                    { 
                        theme: "filled_blue", 
                        size: "large", 
                        width: "320", 
                        shape: "pill",
                        text: "continue_with",
                        logo_alignment: "left"
                    }
                );

                // Munculkan prompt One Tap otomatis (mungkin terblokir di preview iframe)
                google.accounts.id.prompt(); 
                
            } catch (error) {
                console.error("GSI Init Error:", error);
            }

            lucide.createIcons();
        };

        /**
         * Fungsi Logout sederhana (Refresh halaman)
         */
        function handleLogout() {
            window.location.reload();
        }
    </script>
</body>
</html>
