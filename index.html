<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- KEAMANAN: Izin agar Google Login tidak error (FedCM) -->
    <meta http-equiv="Permissions-Policy" content="identity-credentials-get=(self 'https://accounts.google.com')">
    
    <title>StudyFlow - Smart Academic Planner</title>
    
    <!-- Dependencies: Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- EKSPOR EXCEL: Library SheetJS (XLSX) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- CHART.JS: Library untuk Grafik -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style id="dynamic-font-style">
        :root { --base-font-size: 16px; }
        html { font-size: var(--base-font-size); }
    </style>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            background-color: #F8F7FF;
            transition: background-color 0.3s, color 0.3s, font-size 0.2s ease-in-out;
            -webkit-tap-highlight-color: transparent;
        }

        .dark body { background-color: #0f172a; }
        html.dark { color-scheme: dark; }
        
        /* Memastikan dropdown mudah dibaca di mode gelap */
        .dark select option { 
            background-color: #1e293b; 
            color: #f8fafc; 
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s ease-out forwards; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 40px -10px rgba(124, 58, 237, 0.08);
            transition: all 0.3s ease;
        }

        .dark .glass-card {
            background: rgba(30, 41, 59, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
        }

        .glass-sidebar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(124, 58, 237, 0.1);
        }

        .dark .glass-sidebar {
            background: rgba(15, 23, 42, 0.85);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bg-studyflow {
            background-image: url('https://res.cloudinary.com/dfbkph06k/image/upload/v1772856252/607beaa0-a843-4430-b9c5-1ca9f1905b85_jjufh2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.5s ease-in-out;
        }

        /* Latar belakang khusus mode gelap */
        html.dark body.bg-studyflow {
            background-image: url('https://res.cloudinary.com/dfbkph06k/image/upload/v1772856163/uk2zWrj4lijCqPlE1e6A5GJ7H3ZqGKvNxSTJZAzZRQClBx9y6BzmBWrTjmBOBjwfc_VydIWuMaD8HDyAG35MqmvKtAte0n1xElZQxP5Xu7Y_wizbu7.jpg') !important;
            background-color: #0f172a;
        }

        .active-nav {
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            color: white !important;
            box-shadow: 0 10px 20px -5px rgba(109, 40, 217, 0.4);
            transform: scale(1.02);
        }

        #modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
        .dark #modal-overlay { background: rgba(0, 0, 0, 0.7); }
        .font-opt-active { background-color: #7C3AED !important; color: white !important; }
        #loading-screen { background: white; z-index: 1000; }
        .dark #loading-screen { background: #0f172a; }

        .text-gradient {
            background: linear-gradient(to right, #7C3AED, #DB2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .dark .text-gradient {
            background: linear-gradient(to right, #A78BFA, #F472B6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        select.time-select {
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
            outline: none;
            background: transparent;
        }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-studyflow text-gray-800 dark:text-gray-100 min-h-screen relative overflow-x-hidden">

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 flex items-center justify-center transition-opacity duration-500">
        <div class="text-center p-6">
            <div class="w-12 h-12 md:w-16 md:h-16 border-4 border-purple-200 dark:border-purple-900 border-t-purple-600 dark:border-t-purple-400 rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-purple-600 dark:text-purple-400 font-bold animate-pulse text-sm md:text-base tracking-wide">Menyiapkan StudyFlow...</p>
        </div>
    </div>

    <div class="fixed inset-0 bg-white/30 dark:bg-black/40 pointer-events-none z-0 transition-colors duration-300"></div>

    <!-- ================= VIEW LOGIN ================= -->
    <div id="login-view" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="glass-card p-8 md:p-12 rounded-[2rem] md:rounded-[3rem] shadow-2xl w-full max-w-md text-center animate-fade flex flex-col justify-center items-center border-t border-l relative overflow-hidden">
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-purple-400 rounded-full filter blur-2xl opacity-30 animate-pulse"></div>
            
            <div class="mb-8 relative z-10">
                <img src="https://res.cloudinary.com/dfbkph06k/image/upload/v1772855204/ChatGPT_Image_Mar_7_2026_10_41_30_AM_bxqua9.png" alt="StudyFlow Logo" class="w-24 h-24 md:w-28 md:h-28 rounded-3xl mx-auto shadow-xl border-4 border-white dark:border-slate-700 object-cover transform hover:rotate-6 transition-transform duration-500" />
            </div>
            
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter mb-3 text-gray-900 dark:text-white relative z-10">
                Study<span class="text-gradient">Flow</span>
            </h1>
            <p class="text-gray-500 dark:text-gray-300 mb-8 font-medium leading-relaxed px-2 text-sm md:text-base relative z-10">Ruang belajar pintarmu. Kelola jadwal, tugas, dan ujian secara otomatis.</p>
            
            <div class="flex flex-col items-center gap-4 mb-4 w-full relative z-10">
                <button onclick="loginWithGoogle()" class="flex items-center justify-center gap-3 w-full max-w-[280px] bg-white dark:bg-slate-800 border-2 border-purple-50 dark:border-slate-700 text-gray-700 dark:text-white font-bold py-3.5 px-4 rounded-2xl shadow-xl shadow-purple-100 dark:shadow-none hover:bg-purple-50 dark:hover:bg-slate-700 transition-all active:scale-95 text-sm md:text-base group">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5 group-hover:scale-110 transition-transform">
                    Lanjutkan dengan Google
                </button>
            </div>
            
            <div id="conn-status" class="mt-4 min-h-[40px] w-full flex flex-col items-center justify-center text-center px-4 relative z-10 text-xs font-bold text-purple-600 dark:text-purple-300 uppercase tracking-widest"></div>
        </div>
    </div>

    <!-- ================= MAIN DASHBOARD VIEW ================= -->
    <div id="app-view" class="hidden flex min-h-screen relative z-10">
        <!-- Sidebar Desktop -->
        <aside class="hidden lg:flex flex-col w-72 h-screen sticky top-0 glass-sidebar p-6 z-40">
            <div class="flex items-center gap-4 mb-10 px-2 pt-4">
                <img src="https://res.cloudinary.com/dfbkph06k/image/upload/v1772855204/ChatGPT_Image_Mar_7_2026_10_41_30_AM_bxqua9.png" class="w-12 h-12 rounded-xl object-cover shadow-lg border-2 border-white dark:border-slate-700" />
                <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-br from-purple-700 to-pink-500 dark:from-purple-300 dark:to-pink-300 tracking-tighter">StudyFlow</h1>
            </div>

            <nav class="flex-1 space-y-2 overflow-y-auto pr-2 pb-10">
                <button onclick="navigate('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-gray-500 dark:text-gray-300 hover:bg-purple-100 dark:hover:bg-slate-800 hover:text-purple-700 dark:hover:text-white active-nav text-sm">
                    <i data-lucide="layout-grid"></i> Dashboard Analytics
                </button>
                <button onclick="navigate('matkul')" id="nav-matkul" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-gray-500 dark:text-gray-300 hover:bg-purple-100 dark:hover:bg-slate-800 hover:text-purple-700 dark:hover:text-white text-sm">
                    <i data-lucide="book-open"></i> Mata Kuliah
                </button>
                <button onclick="navigate('jadwal')" id="nav-jadwal" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-gray-500 dark:text-gray-300 hover:bg-purple-100 dark:hover:bg-slate-800 hover:text-purple-700 dark:hover:text-white text-sm">
                    <i data-lucide="calendar"></i> Jadwal Kuliah
                </button>
                <button onclick="navigate('tugas')" id="nav-tugas" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-gray-500 dark:text-gray-300 hover:bg-purple-100 dark:hover:bg-slate-800 hover:text-purple-700 dark:hover:text-white text-sm">
                    <i data-lucide="check-square"></i> Tugas & Deadline
                </button>
                <button onclick="navigate('ujian')" id="nav-ujian" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-gray-500 dark:text-gray-300 hover:bg-purple-100 dark:hover:bg-slate-800 hover:text-purple-700 dark:hover:text-white text-sm">
                    <i data-lucide="award"></i> Ujian & Nilai
                </button>
                <button onclick="navigate('target')" id="nav-target" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-gray-500 dark:text-gray-300 hover:bg-purple-100 dark:hover:bg-slate-800 hover:text-purple-700 dark:hover:text-white text-sm">
                    <i data-lucide="target"></i> Target Semester
                </button>
            </nav>

            <div class="pt-6 border-t border-purple-100/50 dark:border-slate-700/50 pb-4">
                <button onclick="logout()" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-red-500 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 hover:shadow-inner transition-all font-bold text-sm">
                    <i data-lucide="log-out"></i> Keluar
                </button>
            </div>
        </aside>

        <main class="flex-1 p-4 md:p-8 lg:p-10 pb-32 lg:pb-10 max-w-[1600px] mx-auto w-full overflow-y-auto h-screen relative z-10">
            <header class="flex justify-between items-center mb-8 bg-white/60 dark:bg-slate-800/60 p-3 md:p-5 rounded-[1.5rem] md:rounded-[2rem] border border-white/80 dark:border-slate-700/80 backdrop-blur-xl sticky top-0 z-50 shadow-sm transition-all hover:shadow-md">
                <div class="flex items-center gap-3 md:gap-5 overflow-hidden">
                    <div class="relative">
                        <img id="profile-pic" src="" class="w-10 h-10 md:w-14 md:h-14 rounded-full border-4 border-white dark:border-slate-700 shadow-md object-cover flex-shrink-0" onerror="this.src='https://ui-avatars.com/api/?name=User&background=7C3AED&color=fff'" />
                        <div class="absolute bottom-0 right-0 w-3 h-3 md:w-3.5 md:h-3.5 bg-green-400 border-2 border-white dark:border-slate-700 rounded-full"></div>
                    </div>
                    <div class="overflow-hidden flex flex-col justify-center">
                        <h2 class="text-[9px] md:text-[10px] font-black text-purple-500 dark:text-purple-300 uppercase tracking-[0.2em] truncate mb-0.5">Selamat Datang,</h2>
                        
                        <div class="flex flex-col sm:flex-row sm:items-center gap-1.5 sm:gap-4 mt-0.5">
                            <h1 id="profile-name" class="text-xs md:text-xl font-black text-gray-800 dark:text-white tracking-tight truncate leading-tight">Memuat...</h1>
                            <div class="flex items-center gap-1.5 md:gap-2">
                                <span class="text-[8px] md:text-[10px] font-bold text-gray-500 dark:text-gray-300 uppercase tracking-wider hidden sm:inline-block">Periode Aktif:</span>
                                <div class="relative flex items-center group">
                                    <select id="semester-select" onchange="changeSemester(this.value)" class="bg-purple-100 dark:bg-slate-700 text-purple-700 dark:text-white font-bold text-[10px] md:text-xs px-2 py-1 md:py-1.5 md:px-3 md:pr-8 pr-6 rounded-lg md:rounded-xl border border-purple-200 dark:border-slate-600 outline-none cursor-pointer hover:bg-purple-200 dark:hover:bg-slate-600 transition-all shadow-sm appearance-none focus:ring-2 focus:ring-purple-400">
                                        <option value="1">Semester 1</option><option value="2">Semester 2</option><option value="3">Semester 3</option><option value="4">Semester 4</option>
                                        <option value="5">Semester 5</option><option value="6">Semester 6</option><option value="7">Semester 7</option><option value="8">Semester 8</option>
                                    </select>
                                    <i data-lucide="chevron-down" class="absolute right-1.5 md:right-2 w-3 h-3 md:w-3.5 md:h-3.5 text-purple-600 dark:text-white pointer-events-none group-hover:translate-y-0.5 transition-transform"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-1.5 md:gap-3">
                    <button onclick="toggleTheme()" class="bg-white dark:bg-slate-700 p-2.5 md:p-3.5 rounded-xl md:rounded-2xl shadow-sm text-gray-400 dark:text-yellow-400 hover:text-purple-600 dark:hover:text-yellow-300 hover:bg-purple-50 dark:hover:bg-slate-600 hover:shadow-md transition-all focus:outline-none" title="Ganti Tema">
                        <i data-lucide="moon" id="theme-icon" class="w-4 h-4 md:w-5 md:h-5"></i>
                    </button>

                    <div class="relative group block">
                        <button class="bg-white dark:bg-slate-700 p-2.5 md:p-3.5 rounded-xl md:rounded-2xl shadow-sm text-gray-400 dark:text-gray-300 hover:text-purple-600 dark:hover:text-white hover:bg-purple-50 dark:hover:bg-slate-600 hover:shadow-md transition-all focus:outline-none" title="Atur Tampilan">
                            <i data-lucide="type" class="w-4 h-4 md:w-5 md:h-5"></i>
                        </button>
                        <div class="absolute right-0 top-full mt-3 opacity-0 invisible group-hover:opacity-100 group-hover:visible glass-card rounded-2xl p-2 w-40 shadow-2xl z-[100] border border-purple-100 dark:border-slate-600 transition-all duration-300 transform origin-top-right scale-95 group-hover:scale-100">
                            <p class="text-[9px] font-black text-purple-400 dark:text-purple-300 uppercase px-3 py-2 mb-1 tracking-widest border-b border-purple-50 dark:border-slate-700">Ukuran Teks</p>
                            <button onclick="setFontSize('small')" id="btn-font-small" class="w-full text-left px-3 py-2.5 rounded-xl text-xs font-bold hover:bg-purple-50 dark:hover:bg-slate-700 transition-all flex items-center justify-between mb-1 text-gray-600 dark:text-gray-200">Kecil <span class="text-[10px] opacity-40 bg-gray-100 dark:bg-slate-600 px-1.5 py-0.5 rounded">14px</span></button>
                            <button onclick="setFontSize('medium')" id="btn-font-medium" class="w-full text-left px-3 py-2.5 rounded-xl text-xs font-bold hover:bg-purple-50 dark:hover:bg-slate-700 transition-all flex items-center justify-between mb-1 text-gray-600 dark:text-gray-200 font-opt-active">Sedang <span class="text-[10px] opacity-40 bg-gray-100 dark:bg-slate-600 px-1.5 py-0.5 rounded">16px</span></button>
                            <button onclick="setFontSize('large')" id="btn-font-large" class="w-full text-left px-3 py-2.5 rounded-xl text-xs font-bold hover:bg-purple-50 dark:hover:bg-slate-700 transition-all flex items-center justify-between text-gray-600 dark:text-gray-200">Besar <span class="text-[10px] opacity-40 bg-gray-100 dark:bg-slate-600 px-1.5 py-0.5 rounded">18px</span></button>
                        </div>
                    </div>

                    <button onclick="exportToExcel()" class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white p-2.5 md:px-6 md:py-3.5 rounded-xl md:rounded-2xl font-bold flex items-center gap-2 shadow-lg shadow-purple-300 dark:shadow-none hover:shadow-xl hover:-translate-y-1 transition-all text-xs md:text-sm active:scale-95 group">
                        <i data-lucide="file-spreadsheet" class="w-4 h-4 md:w-5 md:h-5 group-hover:animate-bounce"></i> <span class="hidden sm:inline">Export Excel</span>
                    </button>
                </div>
            </header>

            <div id="content-area" class="animate-fade relative z-0"></div>
        </main>

        <nav class="lg:hidden fixed bottom-4 left-4 right-4 h-[72px] glass-card rounded-[2rem] shadow-2xl flex items-center justify-around px-2 z-[90] border border-white/80 dark:border-slate-700/80 backdrop-blur-xl overflow-x-auto">
            <button onclick="navigate('dashboard')" id="m-nav-dashboard" class="p-3.5 rounded-2xl flex flex-col items-center gap-1 group flex-shrink-0 text-gray-400"><i data-lucide="layout-grid"></i></button>
            <button onclick="navigate('matkul')" id="m-nav-matkul" class="p-3.5 rounded-2xl flex flex-col items-center gap-1 group flex-shrink-0 text-gray-400"><i data-lucide="book-open"></i></button>
            <button onclick="navigate('jadwal')" id="m-nav-jadwal" class="p-3.5 rounded-2xl flex flex-col items-center gap-1 group flex-shrink-0 text-gray-400"><i data-lucide="calendar"></i></button>
            <button onclick="navigate('tugas')" id="m-nav-tugas" class="p-3.5 rounded-2xl flex flex-col items-center gap-1 group flex-shrink-0 text-gray-400"><i data-lucide="check-square"></i></button>
            <button onclick="navigate('target')" id="m-nav-target" class="p-3.5 rounded-2xl flex flex-col items-center gap-1 group flex-shrink-0 text-gray-400"><i data-lucide="target"></i></button>
            <button onclick="navigate('ujian')" id="m-nav-ujian" class="p-3.5 rounded-2xl flex flex-col items-center gap-1 group flex-shrink-0 text-gray-400"><i data-lucide="award"></i></button>
        </nav>
    </div>

    <!-- ================= MODALS ================= -->
    <div id="modal-overlay" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div id="modal-content-wrapper" class="w-full max-w-md animate-fade transform scale-95 transition-transform duration-300">
            <div id="modal-jadwal" class="hidden glass-card bg-white/90 dark:bg-slate-800/95 p-6 md:p-8 rounded-[2rem] w-full shadow-2xl border border-white dark:border-slate-700 text-gray-800 dark:text-white">
                <div class="flex justify-between items-center mb-6">
                    <div><h3 class="text-xl md:text-2xl font-black tracking-tight">Jadwal Baru</h3></div>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 hover:bg-red-50 p-2 rounded-xl transition-all"><i data-lucide="x"></i></button>
                </div>
                <div class="space-y-4 text-left">
                    <select id="in-j-matkul" class="w-full px-5 py-3.5 rounded-xl bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 text-sm font-medium"></select>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="in-j-sks" class="w-full px-5 py-3.5 rounded-xl bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 text-sm font-medium" placeholder="SKS" />
                        <select id="in-j-dosen" class="w-full px-5 py-3.5 rounded-xl bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 text-sm font-medium"></select>
                    </div>
                    <select id="in-j-hari" class="w-full px-5 py-3.5 rounded-xl bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 text-sm font-medium">
                        <option>Senin</option><option>Selasa</option><option>Rabu</option><option>Kamis</option><option>Jumat</option><option>Sabtu</option>
                    </select>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="relative">
                            <label class="absolute -top-2 left-4 bg-white dark:bg-slate-800 px-1 text-[10px] font-bold text-purple-500 uppercase tracking-wider z-10">Mulai</label>
                            <div class="flex items-center bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 rounded-xl px-2 py-3.5">
                                <select id="in-j-mulai-h" class="time-select w-full text-center text-sm font-medium"></select>
                                <span class="font-bold text-gray-400 dark:text-gray-300 px-0.5">:</span>
                                <select id="in-j-mulai-m" class="time-select w-full text-center text-sm font-medium"></select>
                            </div>
                        </div>
                        <div class="relative">
                            <label class="absolute -top-2 left-4 bg-white dark:bg-slate-800 px-1 text-[10px] font-bold text-purple-500 uppercase tracking-wider z-10">Selesai</label>
                            <div class="flex items-center bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 rounded-xl px-2 py-3.5">
                                <select id="in-j-selesai-h" class="time-select w-full text-center text-sm font-medium"></select>
                                <span class="font-bold text-gray-400 dark:text-gray-300 px-0.5">:</span>
                                <select id="in-j-selesai-m" class="time-select w-full text-center text-sm font-medium"></select>
                            </div>
                        </div>
                    </div>
                    <input type="text" id="in-j-ruang" class="w-full px-5 py-3.5 rounded-xl bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 text-sm font-medium" placeholder="Ruangan" />
                    <button onclick="saveJadwal()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-4 mt-2 rounded-xl font-black active:scale-95 text-sm uppercase tracking-widest">Simpan Jadwal</button>
                </div>
            </div>

            <div id="modal-matkul" class="hidden glass-card bg-white/90 dark:bg-slate-800/95 p-6 md:p-8 rounded-[2rem] w-full border border-white dark:border-slate-700 text-gray-800 dark:text-white text-left">
                <div class="flex justify-between items-center mb-6"><div><h3 class="text-xl md:text-2xl font-black">Mata Kuliah</h3></div><button onclick="closeModal()" class="text-gray-400 p-2 rounded-xl"><i data-lucide="x"></i></button></div>
                <div class="space-y-4">

                <div class="flex justify-between items-center mb-6"><div><h3 class="text-xl md:text-2xl font-black text-left">Tugas Baru</h3></div><button onclick="closeModal()" class="text-gray-400 p-2"><i data-lucide="x"></i></button></div>

            <div id="modal-ujian" class="hidden glass-card bg-white/90 dark:bg-slate-800/95 p-6 md:p-8 rounded-[2rem] w-full border border-white dark:border-slate-700 text-gray-800 dark:text-white text-left">
                <div class="flex justify-between items-center mb-6"><div><h3 class="text-xl md:text-2xl font-black">Jadwal Ujian</h3></div><button onclick="closeModal()" class="text-gray-400 p-2"><i data-lucide="x"></i></button></div>
                <div class="space-y-4">
                    <select id="in-u-matkul" class="w-full px-5 py-3.5 rounded-xl bg-gray-50 dark:bg-slate-700 border dark:border-slate-600"></select>
                    <select id="in-u-jenis" class="w-full px-5 py-3.5 rounded-xl bg-gray-50 dark:bg-slate-700 border dark:border-slate-600"><option>UTS</option><option>UAS</option><option>Kuis</option></select>
                    <div class="grid grid-cols-2 gap-4 text-left">
                        <input type="date" id="in-u-tanggal" class="w-full px-5 py-3.5 rounded-xl bg-gray-50 dark:bg-slate-700 border dark:border-slate-600" />
                        <div class="flex items-center bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 rounded-xl px-2 py-3.5">
                            <select id="in-u-waktu-h" class="time-select w-full text-center text-sm"></select>
                            <span class="font-bold text-gray-400 dark:text-gray-300 px-0.5">:</span>
                            <select id="in-u-waktu-m" class="time-select w-full text-center text-sm"></select>
                        </div>
                    </div>
                    <button onclick="saveUjian()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-4 rounded-xl font-black uppercase">Simpan</button>
                </div>
            </div>

            <div id="modal-target" class="hidden glass-card p-8 rounded-[2rem] w-full border dark:border-slate-700">
                <input type="text" id="in-tg-teks" class="w-full px-5 py-4 rounded-xl bg-gray-50 dark:bg-slate-700 dark:text-white border mb-4" placeholder="Target Semester..." />
                <button onclick="saveTarget()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-4 rounded-xl font-black uppercase">Simpan</button>
            </div>

             <div id="modal-nilai" class="hidden glass-card p-8 rounded-[2rem] w-full border dark:border-slate-700 text-center">
                <input type="hidden" id="in-n-id" /><p id="nilai-matkul-label" class="mb-4 font-bold dark:text-white"></p>
                <input type="number" id="in-n-nilai" class="w-full px-5 py-4 rounded-xl bg-gray-50 dark:bg-slate-700 border dark:text-white text-center text-2xl font-black mb-4" placeholder="0-100" />
                <button onclick="saveNilai()" class="w-full bg-green-500 text-white py-4 rounded-xl font-black uppercase">Simpan</button>
            </div>
        </div>
    </div>

    <!-- ================= JAVASCRIPT ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOO-C9UXIadukCG5Zl7n1qNtiVN-BaecY",
            authDomain: "studyflow-7afba.firebaseapp.com",
            projectId: "studyflow-7afba",
            storageBucket: "studyflow-7afba.firebasestorage.app",
            messagingSenderId: "1034032440737",
            appId: "1:1034032440737:web:030cffaa62db47b3f997e0",
            measurementId: "G-FHQC3GCFW0"
        };
        const APP_ID_ROOT = 'studyflow-planner';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserId = null;
        let activeTab = 'dashboard';
        let store = { matkul: [], jadwal: [], tugas: [], target: [], ujian: [] };
        let listeners = [];
        let currentSemester = localStorage.getItem('studyflow_semester') || '6';
        let isDarkMode = localStorage.getItem('studyflow_theme') === 'dark';
        
        let dashboardChartInstance = null;

        // FUNGSI setFontSize
        function setFontSize(size) {
            const root = document.querySelector(':root');
            const sizes = { small: '14px', medium: '16px', large: '18px' };
            root.style.setProperty('--base-font-size', sizes[size]);

            document.querySelectorAll('[id^="btn-font-"]').forEach(btn => btn.classList.remove('font-opt-active', 'text-purple-600', 'dark:text-purple-400'));
            const activeBtn = document.getElementById(`btn-font-${size}`);
            if (activeBtn) activeBtn.classList.add('font-opt-active', 'text-purple-600', 'dark:text-purple-400');
            
            localStorage.setItem('studyflow_fontsize', size);
        }
        window.setFontSize = setFontSize; 

        function applyTheme() {
            if (isDarkMode) { document.documentElement.classList.add('dark'); document.getElementById('theme-icon').setAttribute('data-lucide', 'sun'); } 
            else { document.documentElement.classList.remove('dark'); document.getElementById('theme-icon').setAttribute('data-lucide', 'moon'); }
            lucide.createIcons();
            // JANGAN panggil renderDashboard di sini agar tidak overwrite view lain saat ganti tema
            if(activeTab === 'dashboard') {
                const container = document.getElementById('content-area');
                if(container) renderDashboard(container);
            }
        }
        window.toggleTheme = () => { isDarkMode = !isDarkMode; localStorage.setItem('studyflow_theme', isDarkMode ? 'dark' : 'light'); applyTheme(); };

        window.changeSemester = (val) => { currentSemester = val; localStorage.setItem('studyflow_semester', val); renderUI(); };

        function getSemesterData(colName) {
            return store[colName].filter(item => String(item.semester) === String(currentSemester) || (!item.semester && String(currentSemester) === '6'));
        }

        function updateDynamicDropdowns() {
            const activeMatkul = getSemesterData('matkul');
            const matkulHTML = activeMatkul.length > 0 
                ? `<option value="" disabled selected>Pilih Mata Kuliah...</option>` + activeMatkul.map(m => `<option value="${m.nama}">${m.nama}</option>`).join('')
                : `<option value="" disabled selected>⚠️ Input Matkul dulu</option>`;
            ['in-j-matkul', 'in-t-matkul', 'in-u-matkul'].forEach(id => { const el = document.getElementById(id); if (el) el.innerHTML = matkulHTML; });
            const activeDosen = [...new Set(activeMatkul.map(m => m.dosen).filter(Boolean))];
            const dosenHTML = activeDosen.length > 0 ? `<option value="" disabled selected>Pilih Dosen...</option>` + activeDosen.map(d => `<option value="${d}">${d}</option>`).join('') : `<option value="" disabled selected>⚠️ Input Matkul dulu</option>`;
            const elDosen = document.getElementById('in-j-dosen');
            if (elDosen) elDosen.innerHTML = dosenHTML;
        }

        function populateTimeSelects() {
            const hours = Array.from({length: 24}, (_, i) => String(i).padStart(2, '0'));
            const minutes = Array.from({length: 12}, (_, i) => String(i * 5).padStart(2, '0'));
            ['in-j-mulai-h', 'in-j-selesai-h', 'in-u-waktu-h'].forEach(id => { const el = document.getElementById(id); if(el) { el.innerHTML = ''; hours.forEach(h => el.add(new Option(h, h))); } });
            ['in-j-mulai-m', 'in-j-selesai-m', 'in-u-waktu-m'].forEach(id => { const el = document.getElementById(id); if(el) { el.innerHTML = ''; minutes.forEach(m => el.add(new Option(m, m))); } });
        }

        // PERBAIKAN FUNGSI EKSPOR KE XLSX
        window.exportToExcel = () => {
            const activeJadwal = getSemesterData('jadwal');
            const activeMatkul = getSemesterData('matkul');
            const activeTugas = getSemesterData('tugas');
            const activeUjian = getSemesterData('ujian');
            
            if (!activeJadwal.length && !activeMatkul.length && !activeTugas.length && !activeUjian.length) { 
                alert("Tidak ada data untuk diekspor!"); 
                return; 
            }

            const wb = XLSX.utils.book_new();
            
            if (activeMatkul.length > 0) {
                const dataMatkul = activeMatkul.map(m => ({ "Mata Kuliah": m.nama, "SKS": m.sks, "Dosen": m.dosen }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dataMatkul), "Daftar Matkul");
            }
            if (activeJadwal.length > 0) {
                const dataJadwal = activeJadwal.map(j => ({ "Hari": j.hari, "Waktu": j.waktu, "Mata Kuliah": j.matkul, "Ruang": j.ruang }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dataJadwal), "Jadwal Kuliah");
            }
            if (activeTugas.length > 0) {
                const dataTugas = activeTugas.map(t => ({ "Tugas": t.nama, "Mata Kuliah": t.matkul, "Deadline": t.deadline, "Status": t.status ? "Selesai" : "Belum" }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dataTugas), "Tugas & Deadline");
            }
            if (activeUjian.length > 0) {
                const dataUjian = activeUjian.map(u => ({ "Jenis": u.jenis, "Mata Kuliah": u.matkul, "Tanggal": u.tanggal, "Waktu": u.waktu, "Nilai": u.nilai || "-" }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dataUjian), "Ujian & Nilai");
            }

            XLSX.writeFile(wb, `StudyFlow_Smt${currentSemester}_Export.xlsx`);
        };

        window.loginWithGoogle = async () => {
            const statusEl = document.getElementById('conn-status');
            statusEl.innerHTML = "Memproses login...";
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            try { await signInWithPopup(auth, provider); } catch (error) {
                if (error.code === 'auth/popup-blocked') await signInWithRedirect(auth, provider);
                else statusEl.innerHTML = `<span class="text-red-500 text-[10px] font-bold uppercase">Gagal Login</span>`;
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserId = user.uid;
                document.getElementById('profile-name').innerText = user.displayName;
                document.getElementById('profile-pic').src = user.photoURL;
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('semester-select').value = currentSemester;
                const savedSize = localStorage.getItem('studyflow_fontsize') || 'medium';
                setFontSize(savedSize);
                applyTheme(); populateTimeSelects(); initDataListeners(); navigate('dashboard');
            } else {
                currentUserId = null; document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('app-view').classList.add('hidden'); document.getElementById('login-view').classList.remove('hidden');
            }
        });

        function initDataListeners() {
            if (!currentUserId) return; listeners.forEach(unsub => unsub());
            ['matkul', 'jadwal', 'tugas', 'target', 'ujian'].forEach(colName => {
                const q = collection(db, 'artifacts', APP_ID_ROOT, 'users', currentUserId, colName);
                const unsub = onSnapshot(q, (snapshot) => { store[colName] = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })); renderUI(); });
                listeners.push(unsub);
            });
        }

        window.navigate = (view) => { activeTab = view; renderUI(); };

        function calculateDaysLeft(dateStr) {
            if (!dateStr) return 999;
            const targetDate = new Date(dateStr);
            const today = new Date();
            today.setHours(0,0,0,0);
            targetDate.setHours(0,0,0,0);
            const diffTime = targetDate - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        function renderUI() {
            const container = document.getElementById('content-area');
            if (!container) return;
            document.querySelectorAll('aside button').forEach(btn => { btn.classList.remove('active-nav'); btn.classList.add('text-gray-500'); });
            const activeNav = document.getElementById('nav-' + activeTab);
            if(activeNav) activeNav.classList.add('active-nav');

            document.querySelectorAll('nav.lg\\:hidden button').forEach(btn => {
               btn.classList.remove('text-purple-600', 'bg-purple-100', 'dark:bg-slate-800');
               btn.classList.add('text-gray-400');
            });
            const activeMob = document.getElementById('m-nav-' + activeTab);
            if(activeMob) activeMob.classList.add('text-purple-600', 'bg-purple-100', 'dark:bg-slate-800');

            updateDynamicDropdowns();
            
            // BERSIHKAN CONTAINER sebelum render ulang agar tidak terjadi tumpang tindih
            container.innerHTML = '';
            
            if (activeTab === 'dashboard') renderDashboard(container);
            else if (activeTab === 'matkul') renderMatkul(container);
            else if (activeTab === 'jadwal') renderJadwal(container);
            else if (activeTab === 'tugas') renderTugas(container);
            else if (activeTab === 'ujian') renderUjian(container);
            else if (activeTab === 'target') renderTarget(container);
            lucide.createIcons();
        }

        function renderDashboard(el) {
            const activeTugas = getSemesterData('tugas');
            const activeMatkul = getSemesterData('matkul');
            const activeUjian = getSemesterData('ujian');
            const activeTarget = getSemesterData('target');
            const activeJadwal = getSemesterData('jadwal');
            
            const totalTugas = activeTugas.length;
            const selesai = activeTugas.filter(t => t.status).length;
            const urgent = activeTugas.filter(t => !t.status).map(t => ({...t, days: calculateDaysLeft(t.deadline)})).sort((a,b)=>a.days-b.days);
            
            const targetDone = activeTarget.filter(t => t.selesai).length;
            const targetProgress = activeTarget.length ? Math.round((targetDone / activeTarget.length) * 100) : 0;

            const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
            const todayName = days[new Date().getDay()];
            const todayClasses = activeJadwal.filter(j => j.hari === todayName);

            el.innerHTML = `
                <div class="animate-fade">
                    <!-- Top Stats Cards -->
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                        <div class="glass-card p-5 rounded-3xl border-l-4 border-l-blue-500">
                           <p class="text-[10px] font-bold uppercase text-gray-400">Mata Kuliah</p>
                           <p class="text-3xl font-black">${activeMatkul.length}</p>
                        </div>
                        <div class="glass-card p-5 rounded-3xl border-l-4 border-l-green-500">
                           <p class="text-[10px] font-bold uppercase text-gray-400">Tugas Selesai</p>
                           <p class="text-3xl font-black">${selesai}<span class="text-sm font-medium text-gray-400">/${totalTugas}</span></p>
                        </div>
                        <div class="glass-card p-5 rounded-3xl border-l-4 border-l-orange-500">
                           <p class="text-[10px] font-bold uppercase text-gray-400">Ujian Mendatang</p>
                           <p class="text-3xl font-black">${activeUjian.filter(u => calculateDaysLeft(u.tanggal) >= 0).length}</p>
                        </div>
                        <div class="glass-card p-5 rounded-3xl border-l-4 border-l-purple-500 bg-purple-50/50 dark:bg-purple-900/10">
                           <p class="text-[10px] font-bold uppercase text-purple-500">Target Semester</p>
                           <p class="text-3xl font-black text-purple-700 dark:text-purple-300">${targetProgress}%</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                        <!-- Progress Donut (Small) -->
                        <div class="glass-card p-6 rounded-[2rem] flex flex-col items-center justify-center min-h-[300px]">
                            <h3 class="font-black mb-4 text-sm flex items-center gap-2 self-start"><i data-lucide="pie-chart" class="w-4 h-4 text-purple-500"></i> Progress Tugas</h3>
                            <div class="relative w-full flex-1 min-h-0 flex justify-center items-center">
                                ${totalTugas > 0 ? `<div style="width: 180px; height: 180px;"><canvas id="tugasChart"></canvas></div>` : `
                                    <div class="flex flex-col items-center text-gray-400 opacity-50">
                                        <i data-lucide="circle-slash" class="w-10 h-10 mb-2"></i>
                                        <p class="text-[10px] font-bold">Belum Ada Data</p>
                                    </div>
                                `}
                            </div>
                        </div>

                        <!-- Beban Tugas Bar Chart -->
                        <div class="glass-card p-6 rounded-[2rem] flex flex-col min-h-[300px]">
                            <h3 class="font-black mb-4 text-sm flex items-center gap-2"><i data-lucide="bar-chart-3" class="w-4 h-4 text-blue-500"></i> Beban Tugas</h3>
                            <div class="flex-1 min-h-0 relative"><canvas id="bebanChart"></canvas></div>
                        </div>

                        <!-- Agenda Hari Ini -->
                        <div class="glass-card p-6 rounded-[2rem] min-h-[300px]">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="font-black text-sm flex items-center gap-2"><i data-lucide="calendar-check" class="w-4 h-4 text-green-500"></i> Agenda Hari Ini</h3>
                                <span class="text-[9px] font-bold uppercase tracking-widest text-gray-400">${todayName}</span>
                            </div>
                            <div class="space-y-3 overflow-y-auto scrollbar-hide max-h-[220px]">
                                ${todayClasses.length > 0 ? todayClasses.map(j => `
                                    <div class="p-3 bg-white/40 dark:bg-slate-700/50 rounded-2xl border-l-4 border-l-purple-500">
                                        <p class="font-bold text-xs">${j.matkul}</p>
                                        <p class="text-[10px] text-gray-500 mt-1 uppercase">${j.waktu}</p>
                                    </div>
                                `).join('') : `
                                    <div class="py-10 text-center flex flex-col items-center opacity-30 grayscale">
                                        <i data-lucide="coffee" class="w-10 h-10 mb-2"></i>
                                        <p class="text-xs font-bold uppercase">Libur dulu ya!</p>
                                    </div>
                                `}
                            </div>
                        </div>
                    </div>

                    <!-- Tugas Mendesak Section -->
                    <div class="glass-card p-6 rounded-[2rem]">
                        <h3 class="font-black mb-6 flex items-center gap-2"><i data-lucide="flame" class="text-red-500"></i> Tugas Mendesak (Countdown)</h3>
                        <div class="space-y-3">
                            ${urgent.length > 0 ? urgent.slice(0,5).map(t => `
                                <div class="p-4 bg-white/40 dark:bg-slate-700/50 rounded-2xl flex justify-between items-center transition-all hover:bg-white/60">
                                    <div class="text-left">
                                        <p class="font-black text-sm text-gray-800 dark:text-gray-100">${t.nama}</p>
                                        <p class="text-[10px] text-purple-500 font-bold uppercase tracking-wider">${t.matkul}</p>
                                    </div>
                                    <div class="bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-tighter">
                                        ${t.days <= 0 ? 'SEKARANG' : t.days + ' Hari Lagi'}
                                    </div>
                                </div>
                            `).join('') : '<p class="text-center text-gray-400 py-10 italic">Tidak ada tugas mendesak. Kerja bagus! ✨</p>'}
                        </div>
                    </div>
                </div>`;

            if(totalTugas > 0) {
                setTimeout(()=> {
                    const ctx = document.getElementById('tugasChart');
                    if (dashboardChartInstance) dashboardChartInstance.destroy();
                    dashboardChartInstance = new Chart(ctx, {
                        type: 'doughnut',
                        data: { 
                            labels: ['Selesai', 'Belum'], 
                            datasets: [{ 
                                data: [selesai, totalTugas - selesai], 
                                backgroundColor: ['#10B981', '#F43F5E'], 
                                borderColor: isDarkMode ? '#1e293b' : '#ffffff', 
                                borderWidth: 2 
                            }] 
                        },
                        options: { 
                            cutout: '80%', 
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } }
                        }
                    });
                }, 50);
            }
            
            setTimeout(() => {
               const ctxBeban = document.getElementById('bebanChart');
               if (!ctxBeban) return;
               new Chart(ctxBeban, {
                   type: 'bar',
                   data: {
                       labels: ['Mgg Ini', 'Mgg Depan', 'Lainnya'],
                       datasets: [{
                           data: [
                               activeTugas.filter(t => !t.status && calculateDaysLeft(t.deadline) <= 7).length,
                               activeTugas.filter(t => !t.status && calculateDaysLeft(t.deadline) > 7 && calculateDaysLeft(t.deadline) <= 14).length,
                               activeTugas.filter(t => !t.status && calculateDaysLeft(t.deadline) > 14).length
                           ],
                           backgroundColor: '#3B82F6',
                           borderRadius: 10
                       }]
                   },
                   options: {
                       responsive: true, maintainAspectRatio: false,
                       plugins: { legend: { display: false } },
                       scales: { y: { beginAtZero: true, ticks: { stepSize: 1, color: isDarkMode ? '#fff' : '#000' } }, x: { ticks: { color: isDarkMode ? '#fff' : '#000' } } }
                   }
               });
            }, 50);
        }

        function renderMatkul(el) {
            const data = getSemesterData('matkul');
            el.innerHTML = `<div class="flex justify-between items-center mb-6 text-left"><h2 class="text-2xl font-black">Mata Kuliah</h2><button onclick="openModal('matkul')" class="bg-gray-900 dark:bg-purple-600 text-white px-4 py-2 rounded-2xl text-xs font-bold uppercase">Tambah</button></div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">${data.map(m => `<div class="glass-card p-6 rounded-[2rem] flex justify-between items-start text-left"><div><h4 class="font-black text-gray-800 dark:text-white">${m.nama}</h4><p class="text-xs text-gray-500 mt-1">${m.dosen}</p></div><button onclick="deleteItem('matkul', '${m.id}')" class="text-red-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" size="18"></i></button></div>`).join('')}</div>`;
        }

        function renderJadwal(el) {
            const data = getSemesterData('jadwal');
            const hari = ['Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
            el.innerHTML = `<div class="flex justify-between items-center mb-6 text-left"><h2 class="text-2xl font-black">Jadwal Kuliah</h2><button onclick="openModal('jadwal')" class="bg-gray-900 dark:bg-purple-600 text-white px-4 py-2 rounded-2xl text-xs font-bold uppercase">Tambah</button></div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-left">${hari.map(h => `<div class="space-y-4"><h3 class="font-black border-b pb-2 dark:border-slate-700 dark:text-purple-400 text-purple-600 uppercase tracking-widest text-xs">${h}</h3>${data.filter(j => j.hari === h).map(j => `<div class="glass-card p-4 rounded-2xl relative overflow-hidden"><div class="absolute left-0 top-0 bottom-0 w-1 bg-purple-500"></div><div class="flex justify-between items-start"><h5 class="font-bold text-gray-800 dark:text-gray-100 text-sm leading-tight">${j.matkul}</h5><button onclick="deleteItem('jadwal', '${j.id}')" class="text-red-200 hover:text-red-500"><i data-lucide="trash-2" size="14"></i></button></div><p class="text-[10px] text-gray-400 font-bold mt-1 uppercase">${j.waktu}</p></div>`).join('') || '<p class="text-[10px] text-gray-300 italic">Libur</p>'}</div>`).join('')}</div>`;
        }

        function renderTugas(el) {
            const data = getSemesterData('tugas');
            el.innerHTML = `<div class="flex justify-between items-center mb-6 text-left"><h2 class="text-2xl font-black">Daftar Tugas</h2><button onclick="openModal('tugas')" class="bg-gray-900 dark:bg-purple-600 text-white px-4 py-2 rounded-2xl text-xs font-bold uppercase">Tambah</button></div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-left">${data.map(t => `<div class="glass-card p-6 rounded-[2rem] flex flex-col justify-between h-full"><div class="flex justify-between items-start mb-4"><span class="text-[9px] font-black uppercase text-purple-500 bg-purple-50 dark:bg-purple-900/30 px-2 py-0.5 rounded">${t.matkul}</span><div class="flex gap-2"><button onclick="toggleStatus('tugas', '${t.id}', ${t.status})" class="text-gray-300 hover:text-green-500"><i data-lucide="${t.status?'check-square':'square'}" size="20"></i></button><button onclick="deleteItem('tugas', '${t.id}')" class="text-gray-200 hover:text-red-500"><i data-lucide="trash-2" size="16"></i></button></div></div><p class="font-bold dark:text-white ${t.status?'line-through opacity-50':''} leading-snug">${t.nama}</p><p class="text-[10px] text-gray-400 mt-2 font-bold uppercase tracking-widest">${t.deadline}</p></div>`).join('')}</div>`;
        }

        function renderUjian(el) {
            const data = getSemesterData('ujian');
            el.innerHTML = `<div class="flex justify-between items-center mb-6 text-left"><h2 class="text-2xl font-black">Ujian & Nilai</h2><button onclick="openModal('ujian')" class="bg-gray-900 dark:bg-purple-600 text-white px-4 py-2 rounded-2xl text-xs font-bold uppercase">Tambah</button></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">${data.map(u => `<div class="glass-card p-6 rounded-[2rem] flex justify-between items-center text-left"><div><span class="text-[10px] font-black bg-orange-100 dark:bg-orange-900/30 text-orange-600 px-2 py-0.5 rounded">${u.jenis}</span><h4 class="font-black mt-2 dark:text-white leading-tight">${u.matkul}</h4><p class="text-[10px] text-gray-500 mt-1 uppercase">${u.tanggal} • ${u.waktu}</p></div><div class="flex items-center gap-4">${u.nilai?`<span class="text-3xl font-black text-green-500">${u.nilai}</span>`:`<button onclick="openModalNilai('${u.id}', '${u.matkul}')" class="text-[10px] font-black bg-purple-100 dark:bg-purple-900 text-purple-700 dark:text-purple-300 p-2 rounded-lg uppercase transition-colors hover:bg-purple-200">Nilai</button>`}<button onclick="deleteItem('ujian', '${u.id}')" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2" size="16"></i></button></div></div>`).join('')}</div>`;
        }

        function renderTarget(el) {
            const data = getSemesterData('target');
            el.innerHTML = `<div class="flex justify-between items-center mb-6 text-left"><h2 class="text-2xl font-black">Target Semester</h2><button onclick="openModal('target')" class="bg-gray-900 dark:bg-purple-600 text-white px-4 py-2 rounded-2xl text-xs font-bold uppercase">Tambah</button></div>
            <div class="space-y-4 text-left">${data.map(t => `<div class="glass-card p-6 rounded-[2rem] flex justify-between items-center cursor-pointer group"><p class="font-bold text-gray-700 dark:text-white ${t.selesai?'line-through opacity-50':''}">${t.teks}</p><div class="flex gap-4"><button onclick="toggleStatus('target', '${t.id}', ${t.selesai})"><i data-lucide="${t.selesai?'check-circle-2':'circle'}" class="${t.selesai?'text-green-500':'text-gray-300 group-hover:text-purple-400'}"></i></button><button onclick="deleteItem('target', '${t.id}')" class="text-gray-200 hover:text-red-500"><i data-lucide="trash-2" size="18"></i></button></div></div>`).join('')}</div>`;
        }

        // --- GLOBAL WRAPPERS ---
        window.openModal = (id) => { 
            document.getElementById('modal-overlay').classList.remove('hidden'); 
            document.querySelectorAll('#modal-content-wrapper > div').forEach(m => m.classList.add('hidden')); 
            document.getElementById('modal-' + id).classList.remove('hidden'); 
            updateDynamicDropdowns();
        };
        window.closeModal = () => document.getElementById('modal-overlay').classList.add('hidden');
        window.openModalNilai = (id, label) => { document.getElementById('in-n-id').value = id; document.getElementById('nilai-matkul-label').innerText = label; window.openModal('nilai'); };

        window.saveJadwal = async () => { 
            const matkul = document.getElementById('in-j-matkul').value; 
            const hM = document.getElementById('in-j-mulai-h').value; const mM = document.getElementById('in-j-mulai-m').value;
            const hS = document.getElementById('in-j-selesai-h').value; const mS = document.getElementById('in-j-selesai-m').value;
            if(!matkul || !hM || !hS) { alert("Lengkapi data!"); return; }
            await addDoc(collection(db, 'artifacts', APP_ID_ROOT, 'users', currentUserId, 'jadwal'), { matkul, sks: document.getElementById('in-j-sks').value, dosen: document.getElementById('in-j-dosen').value, hari: document.getElementById('in-j-hari').value, waktu: `${hM}:${mM} - ${hS}:${mS}`, ruang: document.getElementById('in-j-ruang').value, semester: currentSemester, createdAt: serverTimestamp() });
            window.closeModal();
        };
        window.saveMatkul = async () => { const n = document.getElementById('in-m-nama').value; const d = document.getElementById('in-m-dosen').value; if(!n || !d) { alert("Lengkapi!"); return; } await addDoc(collection(db, 'artifacts', APP_ID_ROOT, 'users', currentUserId, 'matkul'), { nama: n, sks: document.getElementById('in-m-sks').value, dosen: d, semester: currentSemester }); window.closeModal(); };
        window.saveTugas = async () => { const n = document.getElementById('in-t-nama').value; const m = document.getElementById('in-t-matkul').value; if(!n || !m) { alert("Lengkapi!"); return; } await addDoc(collection(db, 'artifacts', APP_ID_ROOT, 'users', currentUserId, 'tugas'), { nama: n, matkul: m, deadline: document.getElementById('in-t-deadline').value, status: false, semester: currentSemester }); window.closeModal(); };
        window.saveTarget = async () => { const t = document.getElementById('in-tg-teks').value; if(!t) return; await addDoc(collection(db, 'artifacts', APP_ID_ROOT, 'users', currentUserId, 'target'), { teks: t, selesai: false, semester: currentSemester }); window.closeModal(); };
        window.saveUjian = async () => { const m = document.getElementById('in-u-matkul').value; if(!m) return; await addDoc(collection(db, 'artifacts', APP_ID_ROOT, 'users', currentUserId, 'ujian'), { matkul: m, jenis: document.getElementById('in-u-jenis').value, tanggal: document.getElementById('in-u-tanggal').value, waktu: `${document.getElementById('in-u-waktu-h').value}:${document.getElementById('in-u-waktu-m').value}`, nilai: null, semester: currentSemester }); window.closeModal(); };
        window.saveNilai = async () => { const id = document.getElementById('in-n-id').value; const v = document.getElementById('in-n-nilai').value; if(!v) return; await updateDoc(doc(db, 'artifacts', APP_ID_ROOT, 'users', currentUserId, 'ujian', id), { nilai: v }); window.closeModal(); };
        window.toggleStatus = async (col, docId, s) => { await updateDoc(doc(db, 'artifacts', APP_ID_ROOT, 'users', currentUserId, col, docId), { [col==='tugas'?'status':'selesai']: !s }); };
        window.deleteItem = async (col, docId) => { if(confirm('Hapus item ini?')) await deleteDoc(doc(db, 'artifacts', APP_ID_ROOT, 'users', currentUserId, col, docId)); };
        window.logout = async () => { await signOut(auth); window.location.reload(); };
        window.navigate = navigate;

    </script>
</body>
</html>
