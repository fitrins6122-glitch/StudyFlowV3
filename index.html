<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Izin keamanan FedCM untuk Google Sign-In -->
    <meta http-equiv="Permissions-Policy" content="identity-credentials-get=(self 'https://accounts.google.com')">
    
    <title>Purple Study Planner</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Identity Services (OAuth 2.0) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        /* Custom Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(2rem); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-slide-in { animation: slideInRight 0.3s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        
        /* Hide scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #C4B5FD; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #A78BFA; }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="font-sans text-gray-800 bg-[#F8F7FF] selection:bg-[#C4B5FD] selection:text-[#7C3AED] min-h-screen flex relative overflow-x-hidden">

    <!-- Artistic Background -->
    <div class="fixed inset-0 z-0 bg-cover bg-center bg-no-repeat pointer-events-none" style="background-image: url('https://res.cloudinary.com/dfbkph06k/image/upload/v1772856252/607beaa0-a843-4430-b9c5-1ca9f1905b85_jjufh2.png')">
        <div class="absolute inset-0 bg-white/30 backdrop-blur-[2px]"></div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2"></div>

    <!-- ================= LOGIN VIEW ================= -->
    <div id="login-view" class="fixed inset-0 z-40 flex items-center justify-center p-4">
        <div class="bg-white/80 backdrop-blur-xl p-8 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white w-full max-w-md relative animate-zoom-in min-h-[400px] flex flex-col justify-center transition-all duration-300">
            
            <div id="login-main" class="text-center animate-fade-in">
                <!-- LOGO DIPERBESAR -->
                <img src="https://res.cloudinary.com/dfbkph06k/image/upload/v1772855204/ChatGPT_Image_Mar_7_2026_10_41_30_AM_bxqua9.png" alt="StudyFlow Logo" class="w-32 h-32 rounded-3xl mx-auto shadow-lg mb-6 transform -rotate-3 hover:rotate-0 transition-transform duration-300 object-cover border-4 border-white" />
                <h1 class="text-3xl font-extrabold text-gray-800 mb-2">
                    Study<span class="text-[#7C3AED]">Flow</span>
                </h1>
                <p class="text-gray-500 mb-8 font-medium text-sm">Masuk untuk mengatur jadwal dan capai target semestermu.</p>
                
                <!-- Container untuk Tombol Login Google Asli -->
                <div id="google-button-container" class="w-full flex justify-center min-h-[44px]"></div>
                
                <p id="auth-status-text" class="text-xs text-gray-400 mt-4">*Sistem keamanan Firebase Database sedang disiapkan...</p>
            </div>
        </div>
    </div>

    <!-- ================= MAIN APP VIEW (Hidden initially) ================= -->
    <div id="main-app" class="hidden w-full flex relative z-10">
        
        <!-- Sidebar (Desktop) -->
        <aside class="hidden md:flex flex-col w-64 bg-white/70 backdrop-blur-2xl border-r border-white/50 h-screen sticky top-0 shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-20">
            <div class="p-6">
                <!-- LOGO SIDEBAR -->
                <div class="flex items-center gap-3 mb-1">
                    <img src="https://res.cloudinary.com/dfbkph06k/image/upload/v1772855204/ChatGPT_Image_Mar_7_2026_10_41_30_AM_bxqua9.png" alt="Logo" class="w-12 h-12 rounded-xl object-cover shadow-sm border-2 border-white" />
                    <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-[#7C3AED] to-[#A78BFA]">
                        StudyFlow
                    </h1>
                </div>
                <p class="text-sm text-gray-500 mt-1 pl-1">Semester 6 Planner</p>
            </div>
            
            <nav class="flex-1 px-4 space-y-2" id="desktop-nav"></nav>

            <div class="p-4 space-y-3">
                <button class="w-full flex items-center justify-center space-x-2 px-4 py-2 bg-[#F8F7FF] text-[#7C3AED] rounded-lg hover:bg-[#EEDCFF] transition-colors">
                    <i data-lucide="download" class="w-[18px] h-[18px]"></i>
                    <span class="text-sm font-semibold">Export Data</span>
                </button>
                <button onclick="window.handleLogout()" class="w-full flex items-center justify-center space-x-2 px-4 py-2 border border-red-100 bg-red-50 text-red-500 rounded-lg hover:bg-red-100 transition-colors">
                    <i data-lucide="log-out" class="w-[18px] h-[18px]"></i>
                    <span class="text-sm font-semibold">Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col min-h-screen">
            <main id="content-area" class="flex-1 p-4 md:p-8 pb-24 md:pb-8 max-w-6xl mx-auto w-full animate-fade-in"></main>
        </div>

        <!-- Bottom Navigation (Mobile) -->
        <nav id="mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-2xl border-t border-white/50 flex justify-around p-3 pb-safe z-50 shadow-[0_-8px_30px_rgba(0,0,0,0.04)]"></nav>
    </div>

    <!-- ================= MODALS (POPUP FORM TAMBAH) ================= -->
    <div id="modal-container" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm transition-opacity">
        
        <!-- Modal Tambah Jadwal -->
        <div id="modal-jadwal" class="hidden bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl animate-zoom-in">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-bold text-gray-800">Tambah Jadwal</h3>
                <button type="button" onclick="window.closeModal()" class="text-gray-400 hover:text-red-500 transition-colors"><i data-lucide="x"></i></button>
            </div>
            <form onsubmit="window.addJadwal(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mata Kuliah</label>
                    <input type="text" id="j-matkul" required class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-[#C4B5FD] focus:border-[#7C3AED] outline-none transition-all" placeholder="Contoh: Metodologi Penelitian">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Hari</label>
                        <select id="j-hari" required class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-[#C4B5FD] focus:border-[#7C3AED] outline-none bg-white">
                            <option value="Senin">Senin</option>
                            <option value="Selasa">Selasa</option>
                            <option value="Rabu">Rabu</option>
                            <option value="Kamis">Kamis</option>
                            <option value="Jumat">Jumat</option>
                            <option value="Sabtu">Sabtu</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Waktu</label>
                        <input type="text" id="j-waktu" required class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-[#C4B5FD] outline-none" placeholder="08:00 - 10:00">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Ruangan</label>
                        <input type="text" id="j-ruang" required class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-[#C4B5FD] outline-none" placeholder="R.105">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Dosen</label>
                        <input type="text" id="j-dosen" required class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-[#C4B5FD] outline-none" placeholder="Nama Dosen">
                    </div>
                </div>
                <button type="submit" class="w-full mt-4 bg-gradient-to-r from-[#7C3AED] to-[#A78BFA] text-white py-3 rounded-xl font-bold shadow-md hover:shadow-lg transition-all hover:-translate-y-0.5">Simpan Jadwal</button>
            </form>
        </div>

        <!-- Modal Tambah Tugas -->
        <div id="modal-tugas" class="hidden bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl animate-zoom-in">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-bold text-gray-800">Tambah Tugas</h3>
                <button type="button" onclick="window.closeModal()" class="text-gray-400 hover:text-red-500 transition-colors"><i data-lucide="x"></i></button>
            </div>
            <form onsubmit="window.addTugas(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Judul Tugas</label>
                    <input type="text" id="t-judul" required class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-[#C4B5FD] outline-none" placeholder="Review Jurnal">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mata Kuliah</label>
                    <input type="text" id="t-matkul" required class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-[#C4B5FD] outline-none" placeholder="Kewirausahaan">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Deadline</label>
                    <input type="date" id="t-tanggal" required class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-[#C4B5FD] outline-none">
                </div>
                <button type="submit" class="w-full mt-4 bg-gradient-to-r from-[#7C3AED] to-[#A78BFA] text-white py-3 rounded-xl font-bold shadow-md hover:shadow-lg transition-all hover:-translate-y-0.5">Simpan Tugas</button>
            </form>
        </div>

        <!-- Modal Tambah Target -->
        <div id="modal-target" class="hidden bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl animate-zoom-in">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-bold text-gray-800">Tambah Target</h3>
                <button type="button" onclick="window.closeModal()" class="text-gray-400 hover:text-red-500 transition-colors"><i data-lucide="x"></i></button>
            </div>
            <form onsubmit="window.addTarget(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Target</label>
                    <input type="text" id="tg-nama" required class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-[#C4B5FD] outline-none" placeholder="Contoh: Lulus Cumlaude">
                </div>
                <button type="submit" class="w-full mt-4 bg-gradient-to-r from-[#7C3AED] to-[#A78BFA] text-white py-3 rounded-xl font-bold shadow-md hover:shadow-lg transition-all hover:-translate-y-0.5">Simpan Target</button>
            </form>
        </div>

    </div>

    <!-- ================= JAVASCRIPT LOGIC (FIREBASE MODULE) ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- SISTEM NOTIFIKASI TOAST (PENGGANTI ALERT) ---
        window.showToast = function(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `px-5 py-3 rounded-xl text-white text-sm font-semibold shadow-xl transform transition-all duration-300 translate-y-10 opacity-0 flex items-center gap-2 ${isError ? 'bg-red-500' : 'bg-emerald-500'}`;
            toast.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check-circle'}" class="w-4 h-4"></i> ${message}`;
            
            document.getElementById('toast-container').appendChild(toast);
            lucide.createIcons({root: toast});
            
            // Animasi masuk
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            });

            // Hapus otomatis
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // --- STATE & VARIABEL GLOBAL ---
        window.activeTab = 'dashboard';
        window.currentUser = null;
        
        // Data Arrays (fallback storage)
        window.tasks = [];
        window.scheduleData = [];
        window.targets = [];

        // Identitas Aplikasi
        const APP_ID = 'studyflow-planner';
        let db, auth, userId;
        let unsubTasks, unsubSchedules, unsubTargets;

        const navItems = [
            { id: 'dashboard', icon: 'home', label: 'Dashboard' },
            { id: 'jadwal', icon: 'calendar', label: 'Jadwal Kuliah' },
            { id: 'tugas', icon: 'check-square', label: 'Daftar Tugas' },
            { id: 'target', icon: 'target', label: 'Target Semester' },
        ];

        // --- INISIALISASI FIREBASE ---
        async function initFirebase() {
            try {
                // Konfigurasi Firebase dari pengguna (Diupdate dengan App ID & Sender ID)
                const firebaseConfig = {
                    apiKey: "AIzaSy...", // Ganti dengan API Key lengkap (tersedia di tab Project settings > General)
                    authDomain: "studyflow-7afba.firebaseapp.com",
                    projectId: "studyflow-7afba",
                    storageBucket: "studyflow-7afba.appspot.com",
                    messagingSenderId: "1034032440737", // Terekstrak otomatis dari App ID
                    appId: "1:1034032440737:web:030cffaa62db47b3f997e0" // Sesuai dengan yang Anda berikan
                };

                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                await signInAnonymously(auth);
                document.getElementById('auth-status-text').innerText = "*Database siap. Silakan Login dengan Google.";
                
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        userId = user.uid;
                    }
                });
            } catch (error) {
                console.error("Gagal inisialisasi Firebase (Memakai mode lokal):", error);
                document.getElementById('auth-status-text').innerText = "*Berjalan dalam Mode Lokal (Data tidak tersimpan ke cloud).";
            }
        }
        initFirebase();

        // --- GOOGLE OAUTH 2.0 ASLI ---
        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        window.handleCredentialResponse = function(response) {
            const responsePayload = parseJwt(response.credential);
            
            // Menyimpan Data Profil Google User
            window.currentUser = {
                name: responsePayload.name,
                firstName: responsePayload.given_name || responsePayload.name.split(' ')[0],
                email: responsePayload.email,
                avatar: responsePayload.picture
            };
            
            // Memulai proses penarikan data pribadi dari Firestore jika Firebase aktif
            if(userId && db) {
                startFirestoreListeners();
            }
            
            // Mengganti view ke dashboard
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            window.switchTab('dashboard');
            window.showToast(`Selamat datang, ${window.currentUser.firstName}!`);
        };

        window.onload = function () {
            if (window.google) {
                google.accounts.id.initialize({
                    client_id: "78272411326-gt4cobigqctk4t0e1n1b29q522j827of.apps.googleusercontent.com", 
                    callback: window.handleCredentialResponse,
                    use_fedcm_for_prompt: true
                });
                
                google.accounts.id.renderButton(
                    document.getElementById("google-button-container"),
                    { theme: "outline", size: "large", width: "100%", text: "continue_with" } 
                );
                
                google.accounts.id.prompt(); 
            }
            lucide.createIcons();
        };

        window.handleLogout = function() {
            window.currentUser = null;
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('login-view').classList.remove('hidden');
            window.showToast('Berhasil logout.');
            
            if(unsubTasks) unsubTasks();
            if(unsubSchedules) unsubSchedules();
            if(unsubTargets) unsubTargets();
        };

        // --- FIRESTORE LISTENERS ---
        function startFirestoreListeners() {
            // Menggunakan struktur path yang aman untuk multi-user
            const tasksRef = collection(db, 'artifacts', APP_ID, 'users', userId, 'tasks');
            unsubTasks = onSnapshot(tasksRef, (snapshot) => {
                window.tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (window.currentUser) window.renderContent();
            }, (error) => console.error("Error fetching tasks:", error));

            const schedulesRef = collection(db, 'artifacts', APP_ID, 'users', userId, 'schedules');
            unsubSchedules = onSnapshot(schedulesRef, (snapshot) => {
                window.scheduleData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (window.currentUser) window.renderContent();
            }, (error) => console.error("Error fetching schedules:", error));

            const targetsRef = collection(db, 'artifacts', APP_ID, 'users', userId, 'targets');
            unsubTargets = onSnapshot(targetsRef, (snapshot) => {
                window.targets = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (window.currentUser) window.renderContent();
            }, (error) => console.error("Error fetching targets:", error));
        }

        // --- CRUD OPERATIONS ---
        window.openModal = function(type) {
            document.getElementById('modal-container').classList.remove('hidden');
            document.getElementById('modal-jadwal').classList.add('hidden');
            document.getElementById('modal-tugas').classList.add('hidden');
            document.getElementById('modal-target').classList.add('hidden');
            document.getElementById(`modal-${type}`).classList.remove('hidden');
        };

        window.closeModal = function() {
            document.getElementById('modal-container').classList.add('hidden');
        };

        // JADWAL
        window.addJadwal = async function(e) {
            e.preventDefault();
            const matkul = document.getElementById('j-matkul').value;
            const day = document.getElementById('j-hari').value;
            const time = document.getElementById('j-waktu').value;
            const room = document.getElementById('j-ruang').value;
            const dosen = document.getElementById('j-dosen').value;

            if(!matkul) return window.showToast("Mata kuliah wajib diisi!", true);

            const newJadwal = { matkul, day, time, room, dosen, createdAt: Date.now() };

            if (userId && db) {
                try {
                    const schedulesRef = collection(db, 'artifacts', APP_ID, 'users', userId, 'schedules');
                    await addDoc(schedulesRef, newJadwal);
                    window.showToast("Jadwal berhasil disimpan!");
                } catch(error) {
                    console.error("Error simpan jadwal: ", error);
                    window.scheduleData.push({ id: Date.now().toString(), ...newJadwal });
                    window.renderContent();
                    window.showToast("Disimpan ke memori lokal (Cloud gagal)", true);
                }
            } else {
                window.scheduleData.push({ id: Date.now().toString(), ...newJadwal });
                window.renderContent();
                window.showToast("Disimpan ke memori lokal.");
            }
            
            e.target.reset();
            window.closeModal();
        };

        window.deleteJadwal = async function(docId) {
            if (userId && db) {
                try {
                    await deleteDoc(doc(db, 'artifacts', APP_ID, 'users', userId, 'schedules', docId));
                    window.showToast("Jadwal dihapus!");
                } catch(err) {
                    window.scheduleData = window.scheduleData.filter(j => j.id !== docId);
                    window.renderContent();
                }
            } else {
                window.scheduleData = window.scheduleData.filter(j => j.id !== docId);
                window.renderContent();
                window.showToast("Jadwal dihapus dari lokal!");
            }
        };

        // TUGAS
        window.addTugas = async function(e) {
            e.preventDefault();
            const title = document.getElementById('t-judul').value;
            const matkul = document.getElementById('t-matkul').value;
            const deadlineDate = document.getElementById('t-tanggal').value;

            if(!title) return window.showToast("Judul tugas wajib diisi!", true);

            const newTask = { title, matkul, deadlineDate, status: 'Belum', createdAt: Date.now() };

            if (userId && db) {
                try {
                    const tasksRef = collection(db, 'artifacts', APP_ID, 'users', userId, 'tasks');
                    await addDoc(tasksRef, newTask);
                    window.showToast("Tugas berhasil ditambahkan!");
                } catch(error) {
                    console.error("Error simpan tugas: ", error);
                    window.tasks.push({ id: Date.now().toString(), ...newTask });
                    window.renderContent();
                    window.showToast("Disimpan ke memori lokal (Cloud gagal)", true);
                }
            } else {
                window.tasks.push({ id: Date.now().toString(), ...newTask });
                window.renderContent();
                window.showToast("Tugas disimpan ke lokal.");
            }
            
            e.target.reset();
            window.closeModal();
        };

        window.deleteTask = async function(docId) {
            if (userId && db) {
                try {
                    await deleteDoc(doc(db, 'artifacts', APP_ID, 'users', userId, 'tasks', docId));
                    window.showToast("Tugas dihapus!");
                } catch(err) {
                    window.tasks = window.tasks.filter(t => t.id !== docId);
                    window.renderContent();
                }
            } else {
                window.tasks = window.tasks.filter(t => t.id !== docId);
                window.renderContent();
                window.showToast("Tugas dihapus dari lokal!");
            }
        };

        window.toggleTask = async function(docId) {
            const task = window.tasks.find(t => t.id === docId);
            if(!task) return;
            const newStatus = task.status === 'Selesai' ? 'Belum' : 'Selesai';

            if (userId && db) {
                try {
                    await updateDoc(doc(db, 'artifacts', APP_ID, 'users', userId, 'tasks', docId), { status: newStatus });
                } catch(err) {
                    task.status = newStatus;
                    window.renderContent();
                }
            } else {
                task.status = newStatus;
                window.renderContent();
            }
        };

        // TARGET
        window.addTarget = async function(e) {
            e.preventDefault();
            const text = document.getElementById('tg-nama').value;
            
            // Validasi seperti kode snippet dari Anda
            if (!text) {
                window.showToast("Nama target tidak boleh kosong!", true);
                return;
            }
            
            const newTarget = { text, completed: false, timestamp: serverTimestamp(), userId: window.currentUser?.email };

            if (userId && db) {
                try {
                    const targetsRef = collection(db, 'artifacts', APP_ID, 'users', userId, 'targets');
                    await addDoc(targetsRef, newTarget);
                    window.showToast("Data target berhasil disimpan!");
                } catch(error) {
                    console.error("Error simpan data target: ", error);
                    window.showToast("Gagal menyimpan data ke cloud. Cek console log.", true);
                    
                    // Fallback memori lokal
                    window.targets.push({ id: Date.now().toString(), text, completed: false });
                    window.renderContent();
                }
            } else {
                window.targets.push({ id: Date.now().toString(), text, completed: false });
                window.renderContent();
                window.showToast("Disimpan ke memori lokal.");
            }
            
            e.target.reset();
            window.closeModal();
        };

        window.deleteTarget = async function(docId) {
            if (userId && db) {
                try {
                    await deleteDoc(doc(db, 'artifacts', APP_ID, 'users', userId, 'targets', docId));
                    window.showToast("Target dihapus!");
                } catch(err) {
                    window.targets = window.targets.filter(t => t.id !== docId);
                    window.renderContent();
                }
            } else {
                window.targets = window.targets.filter(t => t.id !== docId);
                window.renderContent();
                window.showToast("Target dihapus dari lokal!");
            }
        };

        window.toggleTarget = async function(docId) {
            const target = window.targets.find(t => t.id === docId);
            if(!target) return;
            
            if (userId && db) {
                try {
                    await updateDoc(doc(db, 'artifacts', APP_ID, 'users', userId, 'targets', docId), { completed: !target.completed });
                } catch(err) {
                    target.completed = !target.completed;
                    window.renderContent();
                }
            } else {
                target.completed = !target.completed;
                window.renderContent();
            }
        };

        // --- NAVIGATION & RENDER LOGIC ---
        window.switchTab = function(tabId) {
            window.activeTab = tabId;
            window.renderNavigation();
            window.renderContent();
        };

        window.renderNavigation = function() {
            const desktopNav = document.getElementById('desktop-nav');
            desktopNav.innerHTML = navItems.map(item => `
                <button onclick="window.switchTab('${item.id}')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 ${
                    window.activeTab === item.id 
                    ? 'bg-gradient-to-r from-[#7C3AED] to-[#A78BFA] text-white shadow-md' 
                    : 'text-gray-600 hover:bg-[#F8F7FF] hover:text-[#7C3AED]'
                }">
                    <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                    <span class="font-medium">${item.label}</span>
                </button>
            `).join('');

            const mobileNav = document.getElementById('mobile-nav');
            mobileNav.innerHTML = navItems.map(item => `
                <button onclick="window.switchTab('${item.id}')" class="flex flex-col items-center p-2 rounded-lg transition-colors ${
                    window.activeTab === item.id ? 'text-[#7C3AED]' : 'text-gray-400'
                }">
                    <i data-lucide="${item.icon}" class="w-6 h-6 ${window.activeTab === item.id ? 'drop-shadow-sm' : ''}"></i>
                    <span class="text-[10px] mt-1 font-medium">${item.label}</span>
                </button>
            `).join('');

            lucide.createIcons();
        };

        // Helper Tanggal
        function calculateDaysLeft(deadlineStr) {
            if(!deadlineStr) return 0;
            const todayDate = new Date();
            todayDate.setHours(0,0,0,0);
            const deadlineDate = new Date(deadlineStr);
            deadlineDate.setHours(0,0,0,0);
            const diffTime = deadlineDate - todayDate;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        function formatDate(dateStr) {
            if(!dateStr) return '';
            const options = { day: 'numeric', month: 'short', year: 'numeric' };
            return new Date(dateStr).toLocaleDateString('id-ID', options);
        }

        function getDeadlineColor(days) {
            if (days < 0) return 'text-red-700 bg-red-100 border-red-300'; 
            if (days <= 1) return 'text-red-500 bg-red-50 border-red-200';
            if (days <= 3) return 'text-orange-500 bg-orange-50 border-orange-200';
            return 'text-emerald-500 bg-emerald-50 border-emerald-200';
        }

        window.renderContent = function() {
            const container = document.getElementById('content-area');
            if(!window.currentUser) return;

            let html = '';

            window.tasks.forEach(t => {
                t.daysLeft = calculateDaysLeft(t.deadlineDate);
            });

            const sortedTasks = [...window.tasks].sort((a, b) => {
                if (a.status === 'Selesai' && b.status !== 'Selesai') return 1;
                if (a.status !== 'Selesai' && b.status === 'Selesai') return -1;
                return a.daysLeft - b.daysLeft;
            });

            if (window.activeTab === 'dashboard') {
                const completedTasksCount = window.tasks.filter(t => t.status === 'Selesai').length;
                const completedTargetsCount = window.targets.filter(t => t.completed).length;
                const targetProgress = window.targets.length === 0 ? 0 : Math.round((completedTargetsCount / window.targets.length) * 100);
                const nearDeadlineCount = window.tasks.filter(t => t.daysLeft <= 3 && t.status !== 'Selesai').length;

                let deadlineTasksHtml = sortedTasks.filter(t => t.status !== 'Selesai').slice(0, 3).map(task => `
                    <div class="flex justify-between items-center p-3 rounded-lg border border-gray-100 hover:bg-gray-50 transition-colors">
                        <div>
                            <p class="font-medium text-gray-800 text-sm">${task.title}</p>
                            <p class="text-xs text-gray-500 mt-0.5">${task.matkul} • ${formatDate(task.deadlineDate)}</p>
                        </div>
                        <span class="text-xs font-bold px-2 py-1 rounded-md border ${getDeadlineColor(task.daysLeft)} ${task.daysLeft <= 1 ? 'animate-pulse' : ''}">
                            ${task.daysLeft < 0 ? 'Terlewat' : (task.daysLeft === 0 ? 'Hari Ini' : task.daysLeft + ' Hari Lagi')}
                        </span>
                    </div>
                `).join('');
                if(!deadlineTasksHtml) deadlineTasksHtml = '<p class="text-sm text-gray-400 italic">Tidak ada tugas mendesak.</p>';

                let scheduleHtml = window.scheduleData.slice(0, 2).map(jadwal => `
                    <div class="flex border-l-4 border-[#A78BFA] bg-[#F8F7FF] rounded-r-lg p-3 hover:shadow-md transition-shadow cursor-pointer">
                        <div class="flex-1">
                            <p class="font-semibold text-gray-800">${jadwal.matkul}</p>
                            <div class="flex items-center text-xs text-gray-500 mt-1 gap-3">
                                <span class="flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i> ${jadwal.time}</span>
                                <span class="flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> ${jadwal.room}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                if(!scheduleHtml) scheduleHtml = '<p class="text-sm text-gray-400 italic">Tidak ada jadwal hari ini.</p>';

                html = `
                <div class="space-y-6 animate-fade-in">
                    <!-- Header Banner -->
                    <div class="bg-gradient-to-r from-[#7C3AED] to-[#A78BFA] rounded-2xl p-6 text-white shadow-lg relative overflow-hidden flex items-center justify-between">
                        <div class="relative z-10">
                            <h2 class="text-2xl font-bold mb-1">Halo, ${window.currentUser.firstName}! 👋</h2>
                            <p class="text-[#EEDCFF] opacity-90">Tetap semangat, skripsi menanti di depan mata.</p>
                        </div>
                        <div class="relative z-10 flex items-center space-x-4">
                            <img src="${window.currentUser.avatar}" alt="Profile" class="w-16 h-16 rounded-full border-4 border-white/30 hidden sm:block shadow-md" onerror="this.src='https://ui-avatars.com/api/?name=${window.currentUser.firstName}&background=A78BFA&color=fff'" />
                            <button onclick="window.handleLogout()" class="md:hidden bg-white/20 p-2 rounded-lg hover:bg-white/30 transition-colors backdrop-blur-sm">
                                <i data-lucide="log-out" class="w-5 h-5 text-white"></i>
                            </button>
                        </div>
                        <div class="absolute right-0 top-0 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl -mr-10 -mt-10"></div>
                    </div>

                    <!-- Statistik Card -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-50 flex items-center space-x-4 hover:-translate-y-1 transition-transform duration-300">
                            <div class="p-3 rounded-lg bg-gray-50 text-blue-500"><i data-lucide="book-marked"></i></div>
                            <div>
                                <p class="text-xs text-gray-500 font-medium">Total SKS</p>
                                <p class="text-xl font-bold text-gray-800">20</p>
                            </div>
                        </div>
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-50 flex items-center space-x-4 hover:-translate-y-1 transition-transform duration-300">
                            <div class="p-3 rounded-lg bg-gray-50 text-emerald-500"><i data-lucide="award"></i></div>
                            <div>
                                <p class="text-xs text-gray-500 font-medium">Tugas Selesai</p>
                                <p class="text-xl font-bold text-gray-800">${completedTasksCount}/${window.tasks.length}</p>
                            </div>
                        </div>
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-50 flex items-center space-x-4 hover:-translate-y-1 transition-transform duration-300">
                            <div class="p-3 rounded-lg bg-gray-50 text-orange-500"><i data-lucide="alert-circle"></i></div>
                            <div>
                                <p class="text-xs text-gray-500 font-medium">Deadline Dekat</p>
                                <p class="text-xl font-bold text-gray-800">${nearDeadlineCount}</p>
                            </div>
                        </div>
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-50 flex items-center space-x-4 hover:-translate-y-1 transition-transform duration-300">
                            <div class="p-3 rounded-lg bg-gray-50 text-[#7C3AED]"><i data-lucide="trending-up"></i></div>
                            <div>
                                <p class="text-xs text-gray-500 font-medium">Progress Target</p>
                                <p class="text-xl font-bold text-gray-800">${targetProgress}%</p>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Jadwal Hari Ini -->
                        <div class="bg-white rounded-xl shadow-sm border border-gray-50 p-5">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="font-bold text-gray-800 flex items-center gap-2">
                                    <i data-lucide="calendar" class="w-[18px] h-[18px] text-[#7C3AED]"></i> Jadwal Terbaru
                                </h3>
                            </div>
                            <div class="space-y-3">${scheduleHtml}</div>
                        </div>

                        <!-- Deadline Terdekat -->
                        <div class="bg-white rounded-xl shadow-sm border border-gray-50 p-5">
                            <h3 class="font-bold text-gray-800 flex items-center gap-2 mb-4">
                                <i data-lucide="alert-circle" class="w-[18px] h-[18px] text-red-500"></i> Deadline Terdekat
                            </h3>
                            <div class="space-y-3">${deadlineTasksHtml}</div>
                        </div>
                    </div>
                </div>`;
            } 
            else if (window.activeTab === 'jadwal') {
                let cardsHtml = window.scheduleData.map(jadwal => `
                    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 hover:shadow-md transition-all duration-300 relative group">
                        <button onclick="window.deleteJadwal('${jadwal.id}')" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all bg-white p-1 rounded-md shadow-sm">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-xs font-bold bg-[#F8F7FF] text-[#7C3AED] px-2 py-1 rounded-md">${jadwal.day}</span>
                            <div class="bg-[#A78BFA] w-8 h-8 rounded-full flex items-center justify-center text-white shadow-sm mr-6 group-hover:mr-8 transition-all">
                                <i data-lucide="book-open" class="w-4 h-4"></i>
                            </div>
                        </div>
                        <h3 class="font-bold text-lg text-gray-800 mb-1">${jadwal.matkul}</h3>
                        <p class="text-sm text-gray-500 mb-4">${jadwal.dosen}</p>
                        <div class="bg-gray-50 rounded-lg p-3 space-y-2">
                            <div class="flex items-center text-sm text-gray-600">
                                <i data-lucide="clock" class="w-4 h-4 text-[#A78BFA] mr-2"></i> ${jadwal.time}
                            </div>
                            <div class="flex items-center text-sm text-gray-600">
                                <i data-lucide="map-pin" class="w-4 h-4 text-[#A78BFA] mr-2"></i> ${jadwal.room}
                            </div>
                        </div>
                    </div>
                `).join('');

                if(!cardsHtml) cardsHtml = '<div class="col-span-full text-center py-10 text-gray-400">Belum ada jadwal tersimpan. Klik Tambah Jadwal.</div>';

                html = `
                <div class="space-y-6 animate-fade-in">
                    <div class="flex justify-between items-center">
                        <h2 class="text-2xl font-bold text-gray-800">Jadwal Kuliah</h2>
                        <button onclick="window.openModal('jadwal')" class="bg-gradient-to-r from-[#7C3AED] to-[#A78BFA] text-white px-4 py-2 rounded-lg shadow-md hover:shadow-lg transition-all hover:-translate-y-0.5 text-sm font-medium">
                            + Tambah Jadwal
                        </button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${cardsHtml}</div>
                </div>`;
            }
            else if (window.activeTab === 'tugas') {
                let taskListHtml = sortedTasks.map(task => `
                    <div class="flex items-center p-4 border-b border-gray-50 hover:bg-[#F8F7FF] transition-colors group ${task.status === 'Selesai' ? 'opacity-60 bg-gray-50' : ''}">
                        <button onclick="window.toggleTask('${task.id}')" class="mr-4 focus:outline-none transition-transform active:scale-90">
                            ${task.status === 'Selesai' 
                                ? `<i data-lucide="check-circle-2" class="w-6 h-6 text-emerald-500"></i>` 
                                : `<i data-lucide="circle" class="w-6 h-6 text-gray-300 group-hover:text-[#A78BFA] transition-colors"></i>`
                            }
                        </button>
                        <div class="flex-1">
                            <p class="font-semibold text-gray-800 ${task.status === 'Selesai' ? 'line-through text-gray-500' : ''}">
                                ${task.title}
                            </p>
                            <p class="text-xs text-gray-500">${task.matkul} • <span class="font-medium text-gray-600">Deadline: ${formatDate(task.deadlineDate)}</span></p>
                        </div>
                        <div class="flex items-center gap-3">
                            ${task.status !== 'Selesai' ? `
                                <span class="text-xs font-bold px-3 py-1 rounded-full border ${getDeadlineColor(task.daysLeft)}">
                                    ${task.daysLeft < 0 ? 'Terlewat' : (task.daysLeft === 0 ? 'Hari Ini' : 'Sisa ' + task.daysLeft + ' Hari')}
                                </span>
                            ` : `
                                <span class="text-xs font-bold px-3 py-1 rounded-full border border-emerald-200 bg-emerald-50 text-emerald-600">
                                    Selesai
                                </span>
                            `}
                            <button onclick="window.deleteTask('${task.id}')" class="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all p-1">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `).join('');

                if(!taskListHtml) taskListHtml = '<div class="text-center py-10 text-gray-400">Tidak ada tugas tersimpan saat ini.</div>';

                html = `
                <div class="space-y-6 animate-fade-in">
                    <div class="flex justify-between items-center">
                        <h2 class="text-2xl font-bold text-gray-800">Daftar Tugas</h2>
                        <button onclick="window.openModal('tugas')" class="bg-gradient-to-r from-[#7C3AED] to-[#A78BFA] text-white px-4 py-2 rounded-lg shadow-md hover:shadow-lg transition-all hover:-translate-y-0.5 text-sm font-medium">
                            + Tambah Tugas
                        </button>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">${taskListHtml}</div>
                </div>`;
            }
            else if (window.activeTab === 'target') {
                const completedTargetsCount = window.targets.filter(t => t.completed).length;
                const targetProgress = window.targets.length === 0 ? 0 : Math.round((completedTargetsCount / window.targets.length) * 100);

                let targetsHtml = window.targets.map(target => `
                    <div class="cursor-pointer p-4 rounded-xl border-2 transition-all duration-300 flex items-center justify-between group ${
                        target.completed 
                            ? 'bg-[#F8F7FF] border-[#C4B5FD] shadow-inner' 
                            : 'bg-white border-gray-100 hover:border-[#A78BFA] hover:shadow-md hover:-translate-y-1'
                    }">
                        <div class="flex items-center space-x-4 flex-1" onclick="window.toggleTarget('${target.id}')">
                            <div class="w-6 h-6 rounded-md flex items-center justify-center transition-colors ${
                                target.completed ? 'bg-[#7C3AED] text-white' : 'border-2 border-gray-300'
                            }">
                                ${target.completed ? `<i data-lucide="check-square" class="w-4 h-4"></i>` : ''}
                            </div>
                            <span class="font-medium ${target.completed ? 'text-[#7C3AED] line-through opacity-80' : 'text-gray-700'}">
                                ${target.text}
                            </span>
                        </div>
                        <button onclick="window.deleteTarget('${target.id}')" class="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all p-2 bg-white rounded-md shadow-sm">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `).join('');

                if(!targetsHtml) targetsHtml = '<div class="col-span-full text-center py-10 text-gray-400">Belum ada target tersimpan. Ayo tetapkan targetmu!</div>';

                html = `
                <div class="space-y-6 animate-fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-gray-800">Target Semester 6</h2>
                        <button onclick="window.openModal('target')" class="bg-gradient-to-r from-[#7C3AED] to-[#A78BFA] text-white px-4 py-2 rounded-lg shadow-md hover:shadow-lg transition-all hover:-translate-y-0.5 text-sm font-medium">
                            + Tambah Target
                        </button>
                    </div>
                    
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-6">
                        <div class="flex justify-between items-end mb-2">
                            <div>
                                <h3 class="text-lg font-bold text-gray-800">Progress Keseluruhan</h3>
                                <p class="text-sm text-gray-500">${completedTargetsCount} dari ${window.targets.length} Target Selesai</p>
                            </div>
                            <span class="text-2xl font-extrabold text-[#7C3AED]">${targetProgress}%</span>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-3 overflow-hidden">
                            <div class="bg-gradient-to-r from-[#7C3AED] to-[#A78BFA] h-3 rounded-full transition-all duration-1000 ease-out" style="width: ${targetProgress}%"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${targetsHtml}</div>
                </div>`;
            }

            container.innerHTML = html;
            lucide.createIcons();
        };
    </script>
</body>
</html>
